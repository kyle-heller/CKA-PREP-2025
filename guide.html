const CKS_QUESTIONS=[
{id:1,title:"AppArmor Profile",difficulty:"Medium",domain:"System Hardening",scenario:[n("SSH to the worker node and load the AppArmor profile at /etc/apparmor.d/nginx_apparmor."),n("Edit the Pod manifest at /home/candidate/nginx-pod.yaml to use the nginx-profile-2 profile."),n("Deploy the Pod and verify the AppArmor profile is enforced.")],concepts:[n("DOCS PAGE: Search 'apparmor' in kubernetes.io. The tutorial has the exact Pod YAML with securityContext.appArmorProfile you can copy."),n("MEMORIZE the Linux commands: apparmor_parser -q to load a profile, aa-status to verify it's loaded. These are not in k8s docs."),n("Since Kubernetes 1.30, use the new securityContext method, not the old annotation. The docs page shows both — use securityContext.appArmorProfile with type Localhost."),n("EXAM TRAP: The profile must be loaded on the NODE where the pod runs, not the control plane. SSH to the worker first, load it, verify with aa-status, then exit back."),n("DIAGNOSIS: If the pod fails to start, check kubectl describe pod for an AppArmor error. Common cause: profile not loaded on that node.")],solution:[n("Step one. SSH to the worker and load the profile. Verify it's loaded."),c("ssh node01\napparmor_parser -q /etc/apparmor.d/nginx_apparmor\naa-status | grep nginx-profile-2\nexit"),n("Step two. Edit the pod manifest. Copy the appArmorProfile block from the docs."),c("# Add to spec.containers[0].securityContext:\n  securityContext:\n    appArmorProfile:\n      type: Localhost\n      localhostProfile: nginx-profile-2"),n("Step three. Apply and verify enforcement."),c("kubectl apply -f /home/candidate/nginx-pod.yaml\nkubectl exec nginx-pod -- touch /etc/test\n# Should fail: Permission denied")]},
{id:2,title:"NetworkPolicy Deny-All",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Create a NetworkPolicy named deny-all in the testing namespace."),n("It must block all ingress and egress traffic for all pods.")],concepts:[n("DOCS PAGE: Search 'network policy' in kubernetes.io. The page has a full NetworkPolicy YAML template you can copy and simplify."),n("MEMORIZE this pattern: podSelector empty braces selects ALL pods. policyTypes lists both Ingress and Egress. No ingress or egress rules means deny all."),n("EXAM TRAP: If you only list Ingress in policyTypes, egress is still wide open. You MUST list both for a full deny-all."),n("This is a 30-second question. Write the short YAML, apply it, move on. Don't overthink it.")],solution:[n("One YAML, one apply. Copy from docs and simplify."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: deny-all\n  namespace: testing\nspec:\n  podSelector: {}\n  policyTypes:\n  - Ingress\n  - Egress\nEOF"),n("Verify the policy is applied."),c("kubectl describe netpol deny-all -n testing")]},
{id:3,title:"ServiceAccount Token",difficulty:"Medium",domain:"Cluster Hardening",scenario:[n("Pod nginx-pod uses a default token. Disable automatic token mounting on the default ServiceAccount."),n("Create a Secret of type service-account-token referencing the default SA."),n("Edit the Pod to manually mount the token from the Secret.")],concepts:[n("DOCS PAGE: Search 'security context' or 'configure service accounts' for automountServiceAccountToken YAML."),n("IMPERATIVE: kubectl patch sa default -p with the JSON to set automountServiceAccountToken false. One command."),n("MEMORIZE: The Secret type is kubernetes.io/service-account-token with annotation kubernetes.io/service-account.name. This is not easily found in docs during the exam."),n("EXAM TRAP: Pods are immutable for volume mounts. You must delete and recreate the pod, not just edit it."),n("The manual mount path must be /var/run/secrets/kubernetes.io/serviceaccount/ — this is where apps expect to find the token.")],solution:[n("Step one. Disable automount with an imperative patch."),c("kubectl patch sa default -p '{\"automountServiceAccountToken\": false}'"),n("Step two. Create the token Secret."),c("cat <<EOF | kubectl apply -f -\napiVersion: v1\nkind: Secret\nmetadata:\n  name: default-sa-token\n  annotations:\n    kubernetes.io/service-account.name: \"default\"\ntype: kubernetes.io/service-account-token\nEOF"),n("Step three. Delete and recreate pod with manual volume mount."),c("kubectl delete pod nginx-pod\nkubectl apply -f - <<'EOF'\napiVersion: v1\nkind: Pod\nmetadata:\n  name: nginx-pod\nspec:\n  serviceAccountName: default\n  automountServiceAccountToken: false\n  containers:\n  - name: nginx\n    image: nginx\n    volumeMounts:\n    - name: token-vol\n      mountPath: /var/run/secrets/kubernetes.io/serviceaccount/\n      readOnly: true\n  volumes:\n  - name: token-vol\n    secret:\n      secretName: default-sa-token\nEOF")]},
{id:4,title:"Secure API Server",difficulty:"Medium",domain:"Cluster Hardening",scenario:[n("The API server was configured to allow unauthenticated and unauthorized access."),n("Re-secure it: use Node,RBAC authorization, NodeRestriction admission, disable anonymous auth."),n("Remove the ClusterRoleBinding granting access to system:anonymous.")],concepts:[n("DOCS PAGE: Search 'admission controllers' for the list of available plugins and their flags."),n("MEMORIZE these three flags: --authorization-mode=Node,RBAC, --enable-admission-plugins=NodeRestriction, --anonymous-auth=false. You will use them on multiple CKS questions."),n("DIAGNOSIS: First check the current flags with grep on the manifest: grep authorization-mode /etc/kubernetes/manifests/kube-apiserver.yaml. If it says AlwaysAllow, that's the problem."),n("After editing the static pod manifest, kubelet auto-restarts the API server. Wait about 30 seconds and test with kubectl get nodes."),n("EXAM TRAP: Don't forget to also delete the ClusterRoleBinding for system:anonymous. Fixing the flags alone isn't enough if there's an explicit binding granting anonymous access.")],solution:[n("Step one. Check current settings, then edit the manifest."),c("grep -E 'authorization-mode|admission-plugins|anonymous-auth' /etc/kubernetes/manifests/kube-apiserver.yaml\n# Fix:\n# --authorization-mode=Node,RBAC\n# --enable-admission-plugins=NodeRestriction\n# --anonymous-auth=false"),n("Step two. Remove the anonymous ClusterRoleBinding."),c("kubectl delete clusterrolebinding system:anonymous"),n("Step three. Wait and verify."),c("sleep 30\nkubectl get pods -n kube-system\nkubectl auth whoami")]},
{id:5,title:"Audit Logging",difficulty:"Medium",domain:"Runtime Security",scenario:[n("Enable Kubernetes audit logging at /var/log/kubernetes-logs.log."),n("Retain 5 days, max 10 files, 100 MB per file."),n("Create policy rules for CronJobs at RequestResponse, deployments in kube-system at Request, core and extensions at Request."),n("Exclude watch requests by system:kube-proxy on endpoints or services.")],concepts:[n("DOCS PAGE: Search 'audit' in kubernetes.io. The audit page has a complete policy YAML template and all the API server flags you need."),n("MEMORIZE the four levels in order: None, Metadata, Request, RequestResponse. None logs nothing. RequestResponse logs everything."),n("CRITICAL: Rules are evaluated in order, first match wins. Put your None exclusion rules BEFORE catch-all rules or they'll never match."),n("EXAM TRAP: You need TWO volume mounts in the API server manifest: one for the policy file and one for the log directory. Missing either breaks the API server."),n("MEMORIZE the five API server flags: --audit-policy-file, --audit-log-path, --audit-log-maxage, --audit-log-maxbackup, --audit-log-maxsize."),n("If the API server doesn't restart after changes, check crictl logs for YAML errors. A missing volume mount is the most common cause.")],solution:[n("Step one. Write the audit policy. Order matters: specific rules first, catch-all last."),c("# /etc/audit/audit-policy.yaml\napiVersion: audit.k8s.io/v1\nkind: Policy\nrules:\n  - level: RequestResponse\n    resources:\n      - group: \"batch\"\n        resources: [\"cronjobs\"]\n  - level: Request\n    namespaces: [\"kube-system\"]\n    resources:\n      - group: \"apps\"\n        resources: [\"deployments\"]\n  - level: None\n    users: [\"system:kube-proxy\"]\n    verbs: [\"watch\"]\n    resources:\n      - group: \"\"\n        resources: [\"endpoints\", \"services\"]\n  - level: Request\n    resources:\n      - group: \"\"\n      - group: \"extensions\""),n("Step two. Add flags AND volume mounts to the API server manifest. Both are required."),c("# Flags:\n- --audit-policy-file=/etc/audit/audit-policy.yaml\n- --audit-log-path=/var/log/kubernetes-logs.log\n- --audit-log-maxage=5\n- --audit-log-maxbackup=10\n- --audit-log-maxsize=100\n\n# volumeMounts:\n- mountPath: /etc/audit/audit-policy.yaml\n  name: audit-policy\n  readOnly: true\n- mountPath: /var/log\n  name: audit-log\n\n# volumes:\n- name: audit-policy\n  hostPath: {path: /etc/audit/audit-policy.yaml, type: File}\n- name: audit-log\n  hostPath: {path: /var/log, type: DirectoryOrCreate}")]},
{id:6,title:"Dockerfile & Pod Fixes",difficulty:"Easy",domain:"System Hardening",scenario:[n("A Dockerfile and Pod manifest both contain security violations."),n("Fix two issues in each. Do not add or remove fields, only edit existing ones."),n("Use test-user with UID 5375 when a non-root user is needed.")],concepts:[n("MEMORIZE these four fixes. They appear on at least 3 CKS questions. You must know them cold."),n("Dockerfile fix 1: FROM ubuntu:latest becomes FROM ubuntu:20.04. Pin the version. Latest is mutable."),n("Dockerfile fix 2: USER ROOT becomes USER test-user. Never run as root."),n("Pod fix 1: runAsUser 0 becomes runAsUser 5375. Zero is root."),n("Pod fix 2: privileged true becomes privileged false. Privileged gives full host capabilities."),n("NO DOCS NEEDED: These are pattern recognition. See it, fix it, move on. 60 seconds max.")],solution:[n("Dockerfile fixes. Only change existing values, don't add fields."),c("FROM ubuntu:latest  ->  FROM ubuntu:20.04\nUSER ROOT           ->  USER test-user"),n("Pod manifest fixes."),c("runAsUser: 0        ->  runAsUser: 5375\nprivileged: true    ->  privileged: false")]},
{id:7,title:"kube-bench Fixes",difficulty:"Medium",domain:"Cluster Setup",scenario:[n("Run kube-bench and fix security violations in the API server, kubelet, and etcd."),n("API server needs kubelet-certificate-authority and profiling disabled."),n("Kubelet needs anonymous auth disabled and Webhook authorization."),n("Etcd must not have auto-tls or peer-auto-tls enabled.")],concepts:[n("MEMORIZE the three config file locations: /etc/kubernetes/manifests/kube-apiserver.yaml, /var/lib/kubelet/config.yaml, /etc/kubernetes/manifests/etcd.yaml. You use these on many CKS questions."),n("MEMORIZE: --kubelet-certificate-authority=/etc/kubernetes/pki/ca.crt tells the API server to verify kubelet certs. --profiling=false disables the /debug/pprof endpoint."),n("MEMORIZE kubelet config: authentication.anonymous.enabled false, authorization.mode Webhook. Then systemctl daemon-reload and restart kubelet."),n("MEMORIZE: Remove --auto-tls=true and --peer-auto-tls=true from etcd. These bypass proper PKI by using self-signed certs."),n("DIAGNOSIS: Run kube-bench first to see what's failing. The output tells you exactly which flag to fix and what the expected value is.")],solution:[n("Step one. Fix API server manifest."),c("# /etc/kubernetes/manifests/kube-apiserver.yaml\n- --kubelet-certificate-authority=/etc/kubernetes/pki/ca.crt\n- --profiling=false"),n("Step two. Fix kubelet config and restart."),c("# /var/lib/kubelet/config.yaml\nauthentication:\n  anonymous:\n    enabled: false\nauthorization:\n  mode: Webhook\n\nsudo systemctl daemon-reload\nsudo systemctl restart kubelet"),n("Step three. Fix etcd manifest."),c("# /etc/kubernetes/manifests/etcd.yaml\n# Remove these lines entirely:\n# - --auto-tls=true\n# - --peer-auto-tls=true")]},
{id:8,title:"Encryption at Rest",difficulty:"Medium",domain:"Microservice Vulns",scenario:[n("Enable encryption at rest for Secrets using AES-CBC and identity providers."),n("Create an EncryptionConfiguration manifest."),n("Configure the API server to use it and re-encrypt existing secrets.")],concepts:[n("DOCS PAGE: Search 'encrypt data at rest' in kubernetes.io. The page has the exact EncryptionConfiguration YAML template to copy."),n("MEMORIZE: The first provider in the list is used for encryption. Identity as fallback allows reading old unencrypted secrets during migration."),n("MEMORIZE: Generate a 32-byte key with head -c 32 /dev/urandom | base64. You need this command because the docs don't auto-generate it for you."),n("EXAM TRAP: After adding encryption config, you must re-encrypt existing secrets. They stay unencrypted until you run: kubectl get secrets --all-namespaces -o json | kubectl replace -f -"),n("You need a volume mount for the encryption config directory in the API server manifest. Same pattern as audit logging.")],solution:[n("Step one. Generate key and create EncryptionConfiguration. Copy the template from docs."),c("head -c 32 /dev/urandom | base64\n# Create /etc/kubernetes/enc/enc.yaml:\napiVersion: apiserver.config.k8s.io/v1\nkind: EncryptionConfiguration\nresources:\n  - resources:\n      - secrets\n    providers:\n      - aescbc:\n          keys:\n            - name: key1\n              secret: <paste-base64-key>\n      - identity: {}"),n("Step two. Add flag and volume mount to API server."),c("- --encryption-provider-config=/etc/kubernetes/enc/enc.yaml\n# Add volumeMount and volume for /etc/kubernetes/enc"),n("Step three. Re-encrypt all existing secrets."),c("kubectl get secrets --all-namespaces -o json | kubectl replace -f -")]},
{id:9,title:"Stateless & Immutable Pods",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("In the prod namespace, identify and delete pods that are stateful or not immutable."),n("Stateful means using hostPath or PVC volumes. Not immutable means privileged or writable root filesystem."),n("Only compliant pods should remain.")],concepts:[n("MEMORIZE the criteria: Stateless means no hostPath and no PVC volumes. emptyDir is OK. Immutable means readOnlyRootFilesystem true and privileged false."),n("FASTEST APPROACH: kubectl get pods -n prod -o yaml and grep for the violations. Delete any pod with hostPath, PVC, privileged true, or missing readOnlyRootFilesystem."),n("NO DOCS NEEDED: This is pattern matching. Check each pod's YAML, identify violators, delete them."),n("EXAM TIP: This is a quick-win question. Don't overthink it. Grep, identify, delete, verify.")],solution:[n("Step one. Inspect all pods for violations."),c("kubectl get pods -n prod -o yaml | grep -E 'privileged|readOnlyRootFilesystem|hostPath|persistentVolumeClaim'"),n("Step two. Delete non-compliant pods."),c("kubectl delete --force --grace-period=0 pod app -n prod\nkubectl delete --force --grace-period=0 pod gcc -n prod"),n("Step three. Verify only compliant pods remain."),c("kubectl get pods -n prod")]},
{id:10,title:"RuntimeClass gVisor",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Create a RuntimeClass named sandboxed using the runsc handler."),n("Update all Pods in the server namespace to use this runtime.")],concepts:[n("DOCS PAGE: Search 'RuntimeClass' in kubernetes.io. The page has the exact RuntimeClass and Pod YAML to copy."),n("The RuntimeClass YAML is tiny: just apiVersion, kind, metadata.name, and handler. Copy from docs or write from memory."),n("runtimeClassName goes in spec.template.spec for Deployments, same level as containers."),n("FASTEST APPROACH: kubectl patch in a for loop to update all deployments at once.")],solution:[n("Step one. Create the RuntimeClass. Short enough to write from memory."),c("cat <<EOF | kubectl create -f -\napiVersion: node.k8s.io/v1\nkind: RuntimeClass\nmetadata:\n  name: sandboxed\nhandler: runsc\nEOF"),n("Step two. Patch all deployments to use the runtime."),c("for d in workload1 workload2 workload3; do\n  kubectl patch deploy \"$d\" -n server --type=merge \\\n    -p '{\"spec\":{\"template\":{\"spec\":{\"runtimeClassName\":\"sandboxed\"}}}}'\ndone")]},
{id:11,title:"ImagePolicyWebhook",difficulty:"Medium",domain:"Supply Chain",scenario:[n("The cluster has an incomplete image scanner webhook config at /etc/kubernetes/confcontrol/."),n("Enable ImagePolicyWebhook admission, set defaultAllow to false for implicit deny."),n("Test by deploying a pod with the latest tag.")],concepts:[n("DOCS PAGE: Search 'admission controllers' in kubernetes.io for the ImagePolicyWebhook reference."),n("MEMORIZE: defaultAllow false means deny images if the webhook is unreachable. This is the secure default. defaultAllow true is insecure."),n("You need THREE changes to the API server manifest: add ImagePolicyWebhook to admission plugins, add the config file flag, and add the volume mount."),n("EXAM TRAP: Don't remove NodeRestriction when adding ImagePolicyWebhook. The flag is a comma-separated list: NodeRestriction,ImagePolicyWebhook."),n("DIAGNOSIS: If the API server won't start after changes, check crictl logs. Missing volume mount is the most common cause.")],solution:[n("Step one. Fix the admission config: change defaultAllow to false."),c("# In /etc/kubernetes/confcontrol/admission_configuration.yaml:\n# Change: defaultAllow: true -> defaultAllow: false"),n("Step two. Edit the API server manifest."),c("- --enable-admission-plugins=NodeRestriction,ImagePolicyWebhook\n- --admission-control-config-file=/etc/kubernetes/confcontrol/admission_configuration.yaml\n# Add volume mount for /etc/kubernetes/confcontrol")]},
{id:12,title:"Remove docker.sock Mount",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("A Pod in dev-ops namespace mounts /var/run/docker.sock from the host."),n("This gives privileged access to the Docker daemon."),n("Remove the volume mount from the Deployment.")],concepts:[n("MEMORIZE: docker.sock gives full Docker daemon access. A container can create sibling containers or escape to the host entirely. Always remove it."),n("FASTEST APPROACH: kubectl edit deploy and remove both the volumeMount AND the volume definition. You must remove both or the deployment won't work."),n("NO DOCS NEEDED: This is a find-and-remove exercise. Quick points."),n("After editing, the Deployment controller automatically rolls out new pods without the mount.")],solution:[n("Step one. Find the offending deployment and edit it."),c("kubectl get pods -n dev-ops -o yaml | grep -A 3 docker.sock\nkubectl edit deploy docker-hacker -n dev-ops\n# Remove BOTH the volumeMount and the volume for docker.sock"),n("Step two. Verify the socket is gone."),c("kubectl exec -it <new-pod> -n dev-ops -- ls /var/run/docker.sock\n# Should say: No such file or directory")]},
{id:13,title:"Istio mTLS",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Label the payments namespace for Istio sidecar injection."),n("Create a PeerAuthentication named payments-mtls-strict enforcing STRICT mTLS.")],concepts:[n("MEMORIZE: kubectl label namespace payments istio-injection=enabled. This single label triggers automatic sidecar injection."),n("MEMORIZE the PeerAuthentication YAML: it's short. apiVersion security.istio.io/v1, kind PeerAuthentication, spec.mtls.mode STRICT."),n("STRICT rejects unencrypted traffic. PERMISSIVE allows both encrypted and unencrypted. Always use STRICT on the exam unless told otherwise."),n("EXAM TRAP: Existing pods need a restart to get the sidecar injected. Run kubectl rollout restart deployment -n payments after labeling.")],solution:[n("Step one. Label the namespace for sidecar injection."),c("kubectl label namespace payments istio-injection=enabled --overwrite"),n("Step two. Create PeerAuthentication. Short enough to memorize."),c("cat <<EOF | kubectl apply -f -\napiVersion: security.istio.io/v1\nkind: PeerAuthentication\nmetadata:\n  name: payments-mtls-strict\n  namespace: payments\nspec:\n  mtls:\n    mode: STRICT\nEOF"),n("Step three. Restart pods so they get the sidecar."),c("kubectl rollout restart deployment -n payments")]},
{id:14,title:"Pod Security Admission",difficulty:"Medium",domain:"Microservice Vulns",scenario:[n("Namespace secure-team enforces the restricted Pod Security Standard."),n("A Deployment fails because it violates the restricted profile."),n("Fix the manifest to comply: remove privileged, set non-root, drop capabilities, remove hostPath.")],concepts:[n("DOCS PAGE: Search 'pod security standards' in kubernetes.io. The page lists exactly what each profile requires and forbids."),n("MEMORIZE the restricted profile requirements: runAsNonRoot true, drop ALL capabilities, no hostPath, no privileged, allowPrivilegeEscalation false, readOnlyRootFilesystem true."),n("DIAGNOSIS: Run kubectl describe rs in the namespace to see the FailedCreate event message. It tells you exactly which field violates the restricted profile."),n("EXAM TRAP: Replace hostPath volumes with emptyDir, not just remove them. If a container expects the mount path to exist, removing the volume entirely breaks the app.")],solution:[n("Fix all violations in the deployment manifest."),c("# Remove or change:\nprivileged: true        -> remove or set false\nrunAsUser: 0            -> runAsUser: 65535\ncapabilities.add: NET_ADMIN -> capabilities.drop: [\"ALL\"]\nhostPath volume         -> emptyDir: {}\n# Add if missing:\nrunAsNonRoot: true\nallowPrivilegeEscalation: false\nreadOnlyRootFilesystem: true"),n("Apply and verify."),c("kubectl apply -f /home/masters/insecure-deployment.yaml\nkubectl get pods -n secure-team")]},
{id:15,title:"Worker Node Upgrade",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("The worker node is running an older Kubernetes version."),n("Document the upgrade procedure to /home/candidate/upgrade-procedure.txt."),n("Include drain, kubeadm upgrade, kubelet upgrade, and uncordon steps.")],concepts:[n("DOCS PAGE: Search 'kubeadm upgrade' in kubernetes.io. The page has the exact command sequence for both control plane and worker nodes."),n("MEMORIZE the worker node order: drain, upgrade kubeadm, kubeadm upgrade node, upgrade kubelet and kubectl, daemon-reload, restart kubelet, uncordon."),n("CRITICAL DISTINCTION: Workers use 'kubeadm upgrade node', NOT 'kubeadm upgrade apply'. The apply command is only for the first control plane node."),n("MEMORIZE: apt-mark unhold before install, apt-mark hold after. This prevents accidental upgrades later."),n("EXAM TIP: Copy the exact commands from the docs page. Don't try to remember the apt version syntax.")],solution:[n("The complete upgrade procedure. Copy these commands from the kubeadm upgrade docs page."),c("kubectl drain node01 --ignore-daemonsets\nssh node01\nsudo apt-mark unhold kubeadm\nsudo apt-get update && sudo apt-get install -y kubeadm='1.33.0-*'\nsudo apt-mark hold kubeadm\nsudo kubeadm upgrade node\nsudo apt-mark unhold kubelet kubectl\nsudo apt-get install -y kubelet='1.33.0-*' kubectl='1.33.0-*'\nsudo apt-mark hold kubelet kubectl\nsudo systemctl daemon-reload\nsudo systemctl restart kubelet\nexit\nkubectl uncordon node01")]},
{id:16,title:"Falco: Detect /dev/mem",difficulty:"Medium",domain:"Runtime Security",scenario:[n("Complete a Falco rule to detect any container reading or writing to /dev/mem."),n("Include required output fields: proc.name, proc.cmdline, container.id, image, pod name, namespace."),n("Identify and scale the responsible deployment to zero.")],concepts:[n("FALCO DOCS: The Falco supported-fields reference page lists all available condition and output fields. Bookmark it."),n("MEMORIZE the condition pattern: evt.is_open_read=true or evt.is_open_write=true combined with fd.name contains /path. This is the standard file-access detection pattern."),n("MEMORIZE the output field syntax: percent proc.name, percent proc.cmdline, percent container.id, percent container.image.repository, percent k8s.pod.name, percent k8s.ns.name."),n("EXAM TRAP: Don't use evt.type=read. Use evt.is_open_read=true. They match different syscalls. is_open_read matches the open syscall with read flags."),n("After writing the rule, restart Falco with systemctl restart falco, then check the logs to find which deployment is the offender.")],solution:[n("Step one. Complete the Falco rule with proper condition and output fields."),c("- rule: detect dev mem access\n  desc: Detect read/write to /dev/mem\n  condition: >\n    ((evt.is_open_read=true or evt.is_open_write=true)\n    and fd.name contains /dev/mem)\n  output: >\n    Process %proc.name accessed /dev/mem\n    (command=%proc.cmdline container=%container.id\n    image=%container.image.repository\n    pod_name=%k8s.pod.name namespace=%k8s.ns.name)\n  priority: WARNING"),n("Step two. Restart Falco, identify the offender, scale it down."),c("systemctl restart falco\n# Check Falco output for the pod name, then:\nkubectl scale deployment mem-hacker --replicas=0")]},
{id:17,title:"Audit Logging Extended",difficulty:"Medium",domain:"Runtime Security",scenario:[n("Configure audit logging with 12-day retention, max 8 files, 200MB rotation."),n("Log namespace changes at RequestResponse, secrets in kube-system at Request."),n("Log core and extensions at Request, pods/portforward and services/proxy at Metadata."),n("Omit RequestReceived stage. Default all others at Metadata.")],concepts:[n("DOCS PAGE: Search 'audit' in kubernetes.io. Same page as Q5 — use the policy template and modify the rules."),n("MEMORIZE: omitStages skips logging at certain stages. Omitting RequestReceived reduces noise since you still capture the response."),n("The catch-all rule at the bottom with just a level and no resources matches everything not caught by rules above."),n("MEMORIZE: Subresources use slash syntax in the resources list: pods/portforward, services/proxy."),n("Same volume mount requirements as Q5. Policy file and log directory both need mounts.")],solution:[n("Step one. Write the audit policy with omitStages and ordered rules."),c("apiVersion: audit.k8s.io/v1\nkind: Policy\nomitStages: [\"RequestReceived\"]\nrules:\n  - level: RequestResponse\n    resources: [{group: \"\", resources: [\"namespaces\"]}]\n  - level: Request\n    namespaces: [\"kube-system\"]\n    resources: [{group: \"\", resources: [\"secrets\"]}]\n  - level: Request\n    resources: [{group: \"\"}, {group: \"extensions\"}]\n  - level: Metadata\n    resources: [{group: \"\", resources: [\"pods/portforward\",\"services/proxy\"]}]\n  - level: Metadata"),n("Step two. Add API server flags with the retention settings."),c("- --audit-log-path=/var/log/kubernetes-logs.log\n- --audit-log-maxage=12\n- --audit-log-maxbackup=8\n- --audit-log-maxsize=200\n# Plus volume mounts for policy file and log directory")]},
{id:18,title:"Trivy Scanning",difficulty:"Easy",domain:"Supply Chain",scenario:[n("Scan 5 images for HIGH and CRITICAL vulnerabilities using trivy."),n("Store all results in /opt/trivy-vulnerable.txt.")],concepts:[n("MEMORIZE: trivy image --severity HIGH,CRITICAL imagename. That's the entire command. trivy is pre-installed on the exam."),n("Use --output for the first scan to create the file, then >> to append subsequent scans."),n("NO DOCS NEEDED: This is one command repeated 5 times. Free points."),n("EXAM TIP: The scans can take a while if trivy needs to download the vulnerability database. Start this early and move to other questions while it downloads.")],solution:[n("Scan all five images. First one creates the file, rest append."),c("trivy image --severity HIGH,CRITICAL --output /opt/trivy-vulnerable.txt ubuntu:18.04\ntrivy image --severity HIGH,CRITICAL >> /opt/trivy-vulnerable.txt registry.k8s.io/kube-apiserver:v1.24.0\ntrivy image --severity HIGH,CRITICAL >> /opt/trivy-vulnerable.txt registry.k8s.io/kube-scheduler:v1.23.0\ntrivy image --severity HIGH,CRITICAL >> /opt/trivy-vulnerable.txt postgres:12\ntrivy image --severity HIGH,CRITICAL >> /opt/trivy-vulnerable.txt httpd:2.4.49")]},
{id:19,title:"Falco Process Monitor",difficulty:"Medium",domain:"Runtime Security",scenario:[n("Write a Falco rule to detect new process execution in containers."),n("Configure Falco to write alerts to /opt/falco-alerts/details."),n("Restart the Falco service.")],concepts:[n("MEMORIZE the process execution condition: evt.type in (open,openat,creat) and evt.is_open_exec=true and container and evt.rawres>=0."),n("MEMORIZE: The 'container' keyword alone filters for container events only, excluding host events."),n("MEMORIZE the Falco file output config in /etc/falco/falco.yaml: file_output.enabled true, file_output.filename /path/to/file."),n("MEMORIZE: Custom rules go in /etc/falco/falco_rules.local.yaml, not the default rules file."),n("After any Falco config change: systemctl restart falco.service")],solution:[n("Step one. Write the Falco rule in the local rules file."),c("- rule: Container Drift Detected\n  desc: New executable in a container\n  condition: >\n    evt.type in (open,openat,creat) and evt.is_open_exec=true\n    and container and evt.rawres>=0\n  output: \"%evt.time,%user.uid,%proc.name\"\n  priority: ERROR"),n("Step two. Configure file output in /etc/falco/falco.yaml."),c("file_output:\n  enabled: true\n  keep_alive: false\n  filename: /opt/falco-alerts/details"),n("Step three. Restart Falco."),c("systemctl restart falco.service")]},
{id:20,title:"Restricted NetworkPolicy",difficulty:"Medium",domain:"Microservice Vulns",scenario:[n("Create restricted-policy in dev-team namespace for pods with label environment=dev."),n("Allow ingress from any pod in the same namespace."),n("Allow ingress from pods labeled environment=testing from any namespace.")],concepts:[n("DOCS PAGE: Search 'network policy' in kubernetes.io. The YAML template shows the from clause structure."),n("CRITICAL CONCEPT: Two separate 'from' entries means OR logic. Either rule allows traffic. Within a single entry, namespaceSelector plus podSelector means AND."),n("First rule: podSelector empty braces with no namespaceSelector means same namespace only."),n("Second rule: namespaceSelector empty braces means all namespaces, combined with podSelector matching environment=testing. Together they mean: from any namespace, but only pods with that label."),n("EXAM TRAP: If you put both selectors in one 'from' entry without separation, they become AND logic within the same namespace. The YAML indentation determines the logic.")],solution:[n("Create the NetworkPolicy. Pay attention to the from clause structure."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: restricted-policy\n  namespace: dev-team\nspec:\n  podSelector:\n    matchLabels:\n      environment: dev\n  policyTypes: [Ingress]\n  ingress:\n    - from:\n        - podSelector: {}\n    - from:\n        - namespaceSelector: {}\n          podSelector:\n            matchLabels:\n              environment: testing\nEOF")]},
{id:21,title:"KubeSec Scanning",difficulty:"Easy",domain:"Supply Chain",scenario:[n("Scan a pod manifest with KubeSec and harden it to score at least 4."),n("Add runAsUser, runAsNonRoot, allowPrivilegeEscalation false, readOnlyRootFilesystem, drop ALL capabilities.")],concepts:[n("MEMORIZE these five security fields. They come up on Q6, Q14, Q21, Q41, Q48, Q50. Know them cold."),n("The five fields: runAsUser (non-zero), runAsNonRoot true, allowPrivilegeEscalation false, readOnlyRootFilesystem true, capabilities.drop ALL."),n("Each fix adds approximately 1 point to the KubeSec score. Five fixes gets you to at least 4-5."),n("NO DOCS NEEDED: This is the same pattern every time. Apply the five fixes, re-scan, verify the score.")],solution:[n("Apply all five security fixes to the pod manifest."),c("securityContext:\n  runAsUser: 1000\n  runAsNonRoot: true\n  allowPrivilegeEscalation: false\n  readOnlyRootFilesystem: true\n  capabilities:\n    drop: [\"ALL\"]"),n("Re-scan to verify the score."),c("docker run -i kubesec/kubesec:512c5e0 scan /dev/stdin < /home/candidate/kubesec-test.yaml")]},
{id:22,title:"RuntimeClass Untrusted",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Create RuntimeClass untrusted with handler runsc."),n("Create a Pod named untrusted using alpine 3.18, scheduled on the worker node with gVisor."),n("Capture dmesg output to /opt/course/untrusted-test-dmesg.")],concepts:[n("DOCS PAGE: Search 'RuntimeClass' in kubernetes.io. Same page as Q10."),n("MEMORIZE: nodeName in the pod spec forces scheduling on a specific node. runtimeClassName selects the container runtime."),n("With gVisor, dmesg shows the gVisor kernel instead of the host kernel. This proves the sandboxing is working."),n("EXAM TIP: Use kubectl run to generate the pod skeleton, then add runtimeClassName and nodeName.")],solution:[n("Create the RuntimeClass and Pod."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: node.k8s.io/v1\nkind: RuntimeClass\nmetadata:\n  name: untrusted\nhandler: runsc\n---\napiVersion: v1\nkind: Pod\nmetadata:\n  name: untrusted\nspec:\n  nodeName: node01\n  runtimeClassName: untrusted\n  containers:\n  - name: untrusted\n    image: alpine:3.18\n    command: [\"/bin/sh\", \"-c\", \"sleep 3600\"]\nEOF"),n("Capture dmesg output."),c("kubectl exec untrusted -- dmesg > /opt/course/untrusted-test-dmesg")]},
{id:23,title:"PSP Privileged (Manifest)",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Write a PodSecurityPolicy manifest preventing privileged containers."),n("Include ClusterRole, ServiceAccount, and ClusterRoleBinding."),n("This is a manifest-writing exercise since PSP was removed in K8s 1.25.")],concepts:[n("PSP was removed in K8s 1.25 but the CKS may still test the concepts. The modern equivalent is Pod Security Admission."),n("MEMORIZE: The ClusterRole needs the special 'use' verb on the podsecuritypolicies resource. Not get/list/watch — use."),n("MEMORIZE: privileged false, allowPrivilegeEscalation false, requiredDropCapabilities ALL, runAsUser MustRunAsNonRoot."),n("This is a manifest-writing exercise. You won't apply it since PSP is deprecated. Just write the YAML correctly.")],solution:[n("Write all resources to the solution file."),c("# PodSecurityPolicy\nspec:\n  privileged: false\n  allowPrivilegeEscalation: false\n  requiredDropCapabilities: [\"ALL\"]\n  volumes: [configMap, emptyDir, projected, secret, downwardAPI, persistentVolumeClaim]\n  runAsUser: {rule: MustRunAsNonRoot}\n  readOnlyRootFilesystem: true\n\n# ClusterRole: restrict-access-role (verb: use on PSP)\n# ServiceAccount: psp-restrict-sa in staging\n# ClusterRoleBinding: restrict-access-bind")]},
{id:24,title:"User CSR and RBAC",difficulty:"Medium",domain:"Cluster Hardening",scenario:[n("Create a CertificateSigningRequest for user john, approve it."),n("Create Role john-role allowing list, get, create, delete on pods and secrets."),n("Create RoleBinding john-role-binding in namespace john.")],concepts:[n("DOCS PAGE: Search 'certificate signing request' in kubernetes.io. The page has the exact CSR YAML template and the kubectl certificate approve command."),n("MEMORIZE: The CSR request field must be base64-encoded with no line breaks. Use cat file.csr | base64 | tr -d newline."),n("MEMORIZE: signerName kubernetes.io/kube-apiserver-client is for client authentication certificates."),n("IMPERATIVE for RBAC: kubectl create role and kubectl create rolebinding are much faster than writing YAML."),n("VERIFICATION: kubectl auth can-i list pods --as=john -n john should return yes after setup.")],solution:[n("Step one. Create and approve the CSR. Copy the template from docs."),c("CSR_B64=$(cat /home/candidate/john.csr | base64 | tr -d '\\n')\ncat <<EOF | kubectl apply -f -\napiVersion: certificates.k8s.io/v1\nkind: CertificateSigningRequest\nmetadata:\n  name: john-csr\nspec:\n  request: $CSR_B64\n  signerName: kubernetes.io/kube-apiserver-client\n  usages: [client auth]\nEOF\nkubectl certificate approve john-csr"),n("Step two. Create Role and RoleBinding imperatively."),c("kubectl create role john-role --verb=list,get,create,delete --resource=pods,secrets -n john\nkubectl create rolebinding john-role-binding --role=john-role --user=john -n john"),n("Verify."),c("kubectl auth can-i list pods --as=john -n john")]},
{id:25,title:"TLS Ingress",difficulty:"Easy",domain:"Cluster Setup",scenario:[n("Create a TLS Secret from certificate and key files."),n("Deploy nginx and expose it with a Service."),n("Create an Ingress with TLS for host bingo.com with HTTP-to-HTTPS redirect.")],concepts:[n("IMPERATIVE: kubectl create secret tls name --cert=file --key=file. One command for the TLS secret."),n("IMPERATIVE: kubectl run nginx-pod --image=nginx --expose=true --port=80. Creates both pod and service in one command."),n("DOCS PAGE: Search 'ingress' for the TLS Ingress YAML template. Copy it and change the host, secret name, and backend."),n("MEMORIZE: The nginx redirect annotation is nginx.ingress.kubernetes.io/force-ssl-redirect set to true.")],solution:[n("Step one. Create TLS secret and pod+service imperatively."),c("kubectl create secret tls bingo-tls --cert=/home/candidate/bingo.crt --key=/home/candidate/bingo.key -n testing\nkubectl run nginx-pod -n testing --image=nginx --expose=true --port=80"),n("Step two. Create the TLS Ingress. Copy template from docs."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: bingo-com\n  namespace: testing\n  annotations:\n    nginx.ingress.kubernetes.io/force-ssl-redirect: \"true\"\nspec:\n  rules:\n  - host: bingo.com\n    http:\n      paths:\n      - path: /\n        pathType: Prefix\n        backend:\n          service: {name: nginx-pod, port: {number: 80}}\n  tls:\n  - hosts: [bingo.com]\n    secretName: bingo-tls\nEOF")]},
{id:26,title:"CIS Benchmark Fixes",difficulty:"Easy",domain:"Cluster Setup",scenario:[n("Fix CIS benchmark violations in API server, kubelet, and etcd."),n("API server needs Node,RBAC authorization mode."),n("Kubelet needs anonymous auth disabled and Webhook authorization."),n("Etcd needs client-cert-auth enabled and auto-tls removed.")],concepts:[n("MEMORIZE: This is the same three config files as Q7. Same fixes. kube-apiserver.yaml, kubelet config.yaml, etcd.yaml."),n("MEMORIZE: API server --authorization-mode=Node,RBAC. Kubelet anonymous false, mode Webhook. Etcd --client-cert-auth=true, remove --auto-tls."),n("MEMORIZE: After kubelet changes, systemctl daemon-reload and systemctl restart kubelet. Static pod changes auto-restart."),n("These CIS/kube-bench questions are free points if you know the config locations and flags.")],solution:[n("Fix all three components. Same pattern as Q7."),c("# API Server: --authorization-mode=Node,RBAC\n# Kubelet: authentication.anonymous.enabled: false, authorization.mode: Webhook\n# Etcd: --client-cert-auth=true, remove --auto-tls=true\nsudo systemctl daemon-reload && sudo systemctl restart kubelet")]},
{id:27,title:"Secrets Management",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Decode an existing secret and save values to files."),n("Create a new secret with specific credentials."),n("Mount it as a volume in a redis pod.")],concepts:[n("IMPERATIVE: kubectl create secret generic name --from-literal=key=value. Fastest way to create secrets."),n("MEMORIZE the decode pattern: kubectl get secret name -o jsonpath='{.data.key}' | base64 -d. You use this constantly."),n("DOCS PAGE: Search 'security context' or 'secrets' for the volume mount YAML syntax."),n("MEMORIZE: Mount secrets with readOnly true. The volume spec uses secret.secretName to reference the secret.")],solution:[n("Step one. Decode existing secret values."),c("kubectl get secret admin -n safe -o jsonpath='{.data.username}' | base64 -d > /home/cert-masters/username.txt\nkubectl get secret admin -n safe -o jsonpath='{.data.password}' | base64 -d > /home/cert-masters/password.txt"),n("Step two. Create new secret imperatively."),c("kubectl create secret generic newsecret --from-literal=username=dbadmin --from-literal=password=moresecurepas -n safe"),n("Step three. Create pod with secret volume mount."),c("apiVersion: v1\nkind: Pod\nmetadata: {name: mysecret-pod, namespace: safe}\nspec:\n  containers:\n  - name: db-container\n    image: redis\n    volumeMounts:\n    - {name: secret-vol, mountPath: /etc/mysecret, readOnly: true}\n  volumes:\n  - name: secret-vol\n    secret: {secretName: newsecret}")]},
{id:28,title:"Kill Process on Port 389",difficulty:"Easy",domain:"System Hardening",scenario:[n("Find the suspicious process listening on port 389."),n("List its file descriptors, find the binary path, kill it, and delete the binary.")],concepts:[n("MEMORIZE: ss -tulpn shows all listening ports with process info. grep :389 to find the specific port."),n("MEMORIZE the /proc filesystem: /proc/PID/fd lists file descriptors. /proc/PID/exe is a symlink to the binary."),n("MEMORIZE: readlink -f /proc/PID/exe gives you the full binary path so you can delete it after killing."),n("NO DOCS NEEDED: Pure Linux administration. These commands must be memorized."),n("Port 389 is LDAP. An unauthorized LDAP listener is a security concern that needs immediate termination.")],solution:[n("Find the process, document it, kill it, delete the binary."),c("ss -tulpn | grep :389\n# Note the PID\nls -l /proc/<PID>/fd > /candidate/13/files.txt\nreadlink -f /proc/<PID>/exe\nkill -9 <PID>\nrm -f /usr/local/bin/fake-ldap")]},
{id:29,title:"Role Modification",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Modify Role role-1 to only allow watch on services."),n("Create ClusterRole role-2 allowing update on namespaces."),n("Bind role-2 to ServiceAccount sa-dev-1.")],concepts:[n("IMPERATIVE for create: kubectl create clusterrole role-2 --verb=update --resource=namespaces. One command."),n("IMPERATIVE for binding: kubectl create clusterrolebinding role-2-binding --clusterrole=role-2 --serviceaccount=security:sa-dev-1."),n("For the edit: kubectl edit role role-1 -n security is fastest. Change the verbs and resources in place."),n("MEMORIZE the --serviceaccount format: namespace:name. This trips people up.")],solution:[n("Step one. Edit the existing role to restrict it."),c("kubectl edit role role-1 -n security\n# Change rules to:\nrules:\n- apiGroups: [\"\"]\n  resources: [\"services\"]\n  verbs: [\"watch\"]"),n("Step two. Create ClusterRole and binding imperatively."),c("kubectl create clusterrole role-2 --verb=update --resource=namespaces\nkubectl create clusterrolebinding role-2-binding --clusterrole=role-2 --serviceaccount=security:sa-dev-1")]},
{id:30,title:"Projected SA Token",difficulty:"Medium",domain:"Cluster Hardening",scenario:[n("Disable automount on the default ServiceAccount."),n("Recreate Pod token-demo with a projected serviceAccountToken volume."),n("Configure 600 second expiration and a specific audience.")],concepts:[n("DOCS PAGE: Search 'projected volume' or 'configure service accounts' for the projected token YAML."),n("MEMORIZE: The projected volume uses sources with a serviceAccountToken entry. Fields are path, expirationSeconds, and audience."),n("This is more secure than the default auto-mounted long-lived token because it expires and can be scoped to a specific audience."),n("EXAM TRAP: You must delete and recreate the pod since volume mounts are immutable on a running pod.")],solution:[n("Disable automount and recreate the pod with a projected token."),c("kubectl patch sa default -p '{\"automountServiceAccountToken\": false}'\nkubectl delete pod token-demo --force --grace-period=0"),c("cat <<'EOF' | kubectl apply -f -\napiVersion: v1\nkind: Pod\nmetadata: {name: token-demo}\nspec:\n  serviceAccountName: default\n  containers:\n  - name: nginx\n    image: nginx\n    volumeMounts:\n    - {name: token-vol, mountPath: /var/run/secrets/tokens, readOnly: true}\n  volumes:\n  - name: token-vol\n    projected:\n      sources:\n      - serviceAccountToken:\n          path: token.jwt\n          expirationSeconds: 600\n          audience: https://kubernetes.default.svc.cluster.local\nEOF")]},
{id:31,title:"ImagePolicyWebhook (valhalla)",difficulty:"Medium",domain:"Supply Chain",scenario:[n("Fix the admission config: change defaultAllow from true to false."),n("Enable ImagePolicyWebhook in the API server with the config file."),n("Add volume mount for the config directory.")],concepts:[n("SAME PATTERN AS Q11: defaultAllow false, add ImagePolicyWebhook to admission plugins, add config file flag, add volume mount."),n("MEMORIZE: The only difference between Q11 and Q31 is the config directory path. The steps are identical."),n("EXAM TIP: If you see ImagePolicyWebhook on the exam, it's always the same three changes: defaultAllow, admission plugin flag, volume mount.")],solution:[n("Fix config and update API server. Same pattern as Q11."),c("# Fix: defaultAllow: true -> defaultAllow: false\n# In /etc/kubernetes/imgconfig/admission_configuration.yaml\n\n# kube-apiserver.yaml:\n- --enable-admission-plugins=NodeRestriction,ImagePolicyWebhook\n- --admission-control-config-file=/etc/kubernetes/imgconfig/admission_configuration.yaml\n# Add volume for /etc/kubernetes/imgconfig")]},
{id:32,title:"CiliumNetworkPolicy mTLS",difficulty:"Medium",domain:"Microservice Vulns",scenario:[n("Create CiliumNetworkPolicy team-dev denying outgoing ICMP from role=stuff to role=backend."),n("Create team-dev-2 allowing ingress to role=database from role=api-service with mutual auth required.")],concepts:[n("Cilium docs are NOT allowed on the CKS exam. You must memorize CiliumNetworkPolicy YAML structure."),n("MEMORIZE: CiliumNetworkPolicy uses apiVersion cilium.io/v2. The structure is similar to NetworkPolicy but with extra features like egressDeny and authentication."),n("MEMORIZE: ICMP type 8 is Echo Request (ping). egressDeny with icmps blocks it. The fields array uses type and family."),n("MEMORIZE: authentication mode required enforces mutual TLS between endpoints using SPIFFE identities.")],solution:[n("Create both policies."),c("# Policy 1: Deny ICMP from stuff to backend\napiVersion: cilium.io/v2\nkind: CiliumNetworkPolicy\nmetadata: {name: team-dev, namespace: team-dev}\nspec:\n  endpointSelector: {matchLabels: {role: stuff}}\n  egressDeny:\n    - icmps:\n        - fields: [{type: 8, family: IPv4}]\n      toEndpoints:\n        - matchLabels: {role: backend}"),c("# Policy 2: mTLS ingress\napiVersion: cilium.io/v2\nkind: CiliumNetworkPolicy\nmetadata: {name: team-dev-2, namespace: team-dev}\nspec:\n  endpointSelector: {matchLabels: {role: database}}\n  ingress:\n    - fromEndpoints:\n        - matchLabels: {role: api-service}\n      authentication: {mode: \"required\"}")]},
{id:33,title:"Seccomp Profile",difficulty:"Easy",domain:"System Hardening",scenario:[n("Create a custom Seccomp profile allowing only read, write, exit, sigreturn syscalls."),n("Update Deployment webapp to use this Localhost profile.")],concepts:[n("DOCS PAGE: Search 'seccomp' in kubernetes.io. The tutorial has the securityContext YAML for Localhost profiles."),n("MEMORIZE: Profiles go under /var/lib/kubelet/seccomp/. localhostProfile is relative to that directory."),n("MEMORIZE: The JSON format: defaultAction SCMP_ACT_ERRNO blocks everything. syscalls array with action SCMP_ACT_ALLOW whitelists specific calls."),n("EXAM TIP: The profile goes on the node's filesystem, not in a ConfigMap or Secret. It must exist before the pod starts.")],solution:[n("Step one. Create the seccomp profile on the node."),c("cat > /var/lib/kubelet/seccomp/profiles/seccomp-profile.json << 'EOF'\n{\"defaultAction\":\"SCMP_ACT_ERRNO\",\n \"syscalls\":[{\"names\":[\"read\",\"write\",\"exit\",\"sigreturn\"],\"action\":\"SCMP_ACT_ALLOW\"}]}\nEOF"),n("Step two. Update the deployment to use the profile."),c("# Add to pod spec securityContext:\nsecurityContext:\n  seccompProfile:\n    type: Localhost\n    localhostProfile: profiles/seccomp-profile.json")]},
{id:34,title:"Docker Socket Permissions",difficulty:"Medium",domain:"Microservice Vulns",scenario:[n("Find the pod mounting docker.sock in ci-cd namespace."),n("Restrict socket permissions and harden the pod's securityContext."),n("runAsUser 65535, drop ALL, readOnlyRootFilesystem, no privilege escalation.")],concepts:[n("MEMORIZE: Defense in depth. If you can't remove docker.sock, at least harden the securityContext and restrict socket permissions."),n("MEMORIZE: chown 65535:65535 and chmod 0600 on the socket restricts access to the container's user only."),n("MEMORIZE the five security fields again: runAsUser 65535, readOnlyRootFilesystem true, allowPrivilegeEscalation false, capabilities drop ALL."),n("EXAM TRAP: Pods are immutable for securityContext. You must delete and recreate, not just edit.")],solution:[n("Restrict socket permissions, then recreate with hardened securityContext."),c("kubectl exec -n ci-cd docker-builder -- chown 65535:65535 /var/run/docker.sock\nkubectl exec -n ci-cd docker-builder -- chmod 0600 /var/run/docker.sock"),n("Delete and recreate pod with full securityContext."),c("# securityContext:\n#   runAsUser: 65535\n#   runAsGroup: 65535\n#   readOnlyRootFilesystem: true\n#   allowPrivilegeEscalation: false\n#   capabilities: {drop: [ALL]}")]},
{id:35,title:"Trivy: Delete Vulnerable",difficulty:"Easy",domain:"Supply Chain",scenario:[n("In namespace nato, scan all pod images with trivy for HIGH/CRITICAL vulnerabilities."),n("Delete pods running vulnerable images. Only safe images should remain.")],concepts:[n("FASTEST APPROACH: List all pod images with jsonpath, scan each with trivy, delete the vulnerable ones."),n("MEMORIZE: kubectl get pods -o jsonpath to extract image names. trivy image --severity HIGH,CRITICAL to scan."),n("EXAM TIP: Force delete with --grace-period=0 is acceptable. Don't wait for graceful shutdown during the exam."),n("NO DOCS NEEDED: trivy command plus kubectl delete. Quick points.")],solution:[n("List images, scan each, delete vulnerable pods."),c("kubectl get pods -n nato -o jsonpath='{range .items[*]}{.metadata.name}{\"\\t\"}{.spec.containers[0].image}{\"\\n\"}{end}'\ntrivy image --severity HIGH,CRITICAL nginx:1.25   # check output\ntrivy image --severity HIGH,CRITICAL nginx:1.19   # vulnerable\ntrivy image --severity HIGH,CRITICAL nginx:1.16   # vulnerable\nkubectl delete pod nginx-2 nginx-3 -n nato --force --grace-period=0")]},
{id:36,title:"Default Deny Egress",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Create a NetworkPolicy named default-deny in testing namespace."),n("Block all egress from all pods. podSelector empty, policyTypes Egress.")],concepts:[n("SAME PATTERN AS Q2 but egress only. podSelector empty, policyTypes Egress, no egress rules means deny all outbound."),n("MEMORIZE: This also blocks DNS resolution on port 53. Pods won't be able to resolve service names."),n("This is a 20-second question. Write the short YAML, apply, move on.")],solution:[n("Create the egress deny-all policy."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata: {name: default-deny, namespace: testing}\nspec:\n  podSelector: {}\n  policyTypes: [Egress]\nEOF")]},
{id:37,title:"SA Without Secret Access",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Create ServiceAccount backend-qa in namespace qa."),n("Create Role no-secret-access allowing only get,list on pods, not secrets."),n("Bind the role and update Pod frontend to use this SA.")],concepts:[n("ALL IMPERATIVE: kubectl create sa, kubectl create role, kubectl create rolebinding. Three commands, no YAML needed."),n("MEMORIZE the --serviceaccount format for rolebinding: namespace:name."),n("EXAM TRAP: Pods are immutable for serviceAccountName. Export the pod YAML, delete it, edit the SA name, re-apply."),n("VERIFICATION: kubectl auth can-i get secrets --as=system:serviceaccount:qa:backend-qa -n qa should return no.")],solution:[n("Step one. Create SA, Role, and RoleBinding imperatively."),c("kubectl create sa backend-qa -n qa\nkubectl create role no-secret-access -n qa --verb=get,list --resource=pods\nkubectl create rolebinding backend-qa-binding -n qa --role=no-secret-access --serviceaccount=qa:backend-qa"),n("Step two. Update the pod to use the new SA."),c("kubectl get pod frontend -n qa -o yaml > /tmp/frontend.yaml\n# Edit serviceAccountName: backend-qa\nkubectl delete pod frontend -n qa\nkubectl apply -f /tmp/frontend.yaml")]},
{id:38,title:"Falco Monitor Pod",difficulty:"Medium",domain:"Runtime Security",scenario:[n("Write a Falco rule to detect sensitive file access in containers."),n("Monitor for reads/writes to /etc/shadow."),n("Identify and terminate the offending pod.")],concepts:[n("SAME FALCO PATTERN as Q16: condition uses evt.is_open_read or evt.is_open_write with fd.name matching the path."),n("MEMORIZE: fd.name=/etc/shadow matches the exact path. Use 'contains' for partial matches, '=' for exact matches."),n("MEMORIZE: 'and container' limits to container events. Without it, host processes also trigger the rule."),n("After writing the rule: restart falco, check output, identify the pod, scale or delete the workload.")],solution:[n("Write the rule and act on findings."),c("- rule: detect shadow access\n  condition: (evt.is_open_read=true or evt.is_open_write=true) and fd.name=/etc/shadow and container\n  output: \"Shadow access by %proc.name in %container.id (%k8s.pod.name)\"\n  priority: WARNING"),n("Restart Falco and scale down the offender."),c("systemctl restart falco\n# Check output for pod name, then:\nkubectl scale deploy <offender> --replicas=0")]},
{id:39,title:"Audit Node PVC",difficulty:"Medium",domain:"Runtime Security",scenario:[n("Configure audit logging to capture node and PVC changes."),n("Log Node changes at RequestResponse and PVC changes at Request level."),n("Default everything else to Metadata.")],concepts:[n("SAME PATTERN as Q5 and Q17: Write audit policy rules in order, add a catch-all at the bottom."),n("MEMORIZE: Nodes are in the core API group (empty string). PersistentVolumeClaims are also core API."),n("The catch-all rule with just level Metadata and no resources matches everything not caught above."),n("Don't forget the API server flags and volume mounts. Same pattern every time.")],solution:[n("Write the audit policy rules."),c("rules:\n  - level: RequestResponse\n    resources: [{group: \"\", resources: [\"nodes\"]}]\n  - level: Request\n    resources: [{group: \"\", resources: [\"persistentvolumeclaims\"]}]\n  - level: Metadata")]},
{id:40,title:"Secrets: Retrieve & Mount",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Retrieve and decode existing secret values."),n("Create a new secret and mount it as a volume in a pod.")],concepts:[n("SAME PATTERN as Q27: Decode with jsonpath and base64 -d. Create with --from-literal. Mount as volume with readOnly."),n("IMPERATIVE: kubectl create secret generic is always faster than writing Secret YAML."),n("MEMORIZE the volume mount pattern: volumeMounts name and mountPath, volumes name and secret.secretName.")],solution:[n("Decode, create, and mount."),c("kubectl get secret <name> -o jsonpath='{.data.key}' | base64 -d\nkubectl create secret generic newsecret --from-literal=key=value\n# Mount in pod spec:\nvolumeMounts: [{name: s, mountPath: /etc/secret, readOnly: true}]\nvolumes: [{name: s, secret: {secretName: newsecret}}]")]},
{id:41,title:"Dockerfile Deployment Fixes",difficulty:"Easy",domain:"System Hardening",scenario:[n("Fix security issues in a Dockerfile and Deployment manifest."),n("Pin base image version, use non-root user."),n("Set non-root UID, disable privileged mode.")],concepts:[n("SAME PATTERN as Q6 and Q50. Same four fixes every time. Pin FROM version, USER not root, runAsUser not zero, privileged false."),n("MEMORIZE: These are free points. 60 seconds per question. Don't overthink."),n("The question says don't add or remove fields. Only change existing values.")],solution:[n("Apply the standard four fixes."),c("# Dockerfile: pin FROM version, USER nobody\n# Deployment: runAsUser: 65535, privileged: false, readOnlyRootFilesystem: true")]},
{id:42,title:"SA Naming Policy",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Create ServiceAccounts with specific naming conventions."),n("Create Roles and RoleBindings following naming policy."),n("Verify permissions with kubectl auth can-i.")],concepts:[n("ALL IMPERATIVE: kubectl create sa, kubectl create role, kubectl create rolebinding. Same pattern as Q37, Q45, Q49, Q51."),n("MEMORIZE: kubectl auth can-i verb resource --as=system:serviceaccount:namespace:name. The full SA format for --as."),n("These RBAC questions are repetitive. Master the imperative commands and they're all quick wins.")],solution:[n("Create resources imperatively following naming conventions."),c("kubectl create sa <sa-name> -n <namespace>\nkubectl create role <role-name> --verb=<verbs> --resource=<resources> -n <namespace>\nkubectl create rolebinding <binding-name> --role=<role-name> --serviceaccount=<ns>:<sa> -n <namespace>\nkubectl auth can-i <verb> <resource> --as=system:serviceaccount:<ns>:<sa> -n <ns>")]},
{id:43,title:"PSP Restrict Volumes",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Write a PodSecurityPolicy manifest restricting allowed volume types."),n("Only allow configMap, emptyDir, projected, secret, downwardAPI, PVC.")],concepts:[n("MEMORIZE the safe volume types: configMap, emptyDir, projected, secret, downwardAPI, persistentVolumeClaim. These six are the standard restricted set."),n("hostPath is the dangerous one. It gives containers access to the host filesystem, enabling escape."),n("This is a manifest-writing exercise. Write the volumes list correctly and move on.")],solution:[n("Write the PSP manifest with restricted volume types."),c("spec:\n  volumes:\n    - configMap\n    - emptyDir\n    - projected\n    - secret\n    - downwardAPI\n    - persistentVolumeClaim")]},
{id:44,title:"SBOM Generation",difficulty:"Medium",domain:"Supply Chain",scenario:[n("Generate an SPDX SBOM with bom tool for kube-apiserver."),n("Generate a CycloneDX SBOM with trivy for kube-controller-manager."),n("Scan an existing SBOM for vulnerabilities with trivy sbom.")],concepts:[n("MEMORIZE: bom generate -o output --format json --image imagename. This generates SPDX format."),n("MEMORIZE: trivy image --format cyclonedx -o output imagename. This generates CycloneDX format."),n("MEMORIZE: trivy sbom inputfile -o outputfile. This scans an existing SBOM for vulnerabilities."),n("NO DOCS NEEDED on the exam for basic commands. The question gives you the exact image names and file paths.")],solution:[n("Generate and scan SBOMs. Three separate commands."),c("bom generate -o /opt/candidate/13/sbom1.json --format json --image registry.k8s.io/kube-apiserver:v1.32.0\ntrivy image --format cyclonedx -o /opt/candidate/13/sbom2.json registry.k8s.io/kube-controller-manager:v1.32.0\ntrivy sbom /opt/candidate/13/sbom_check.json -o /opt/candidate/13/sbom_result.json")]},
{id:45,title:"Role Restriction",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Restrict overly-permissive Role test-role to only get on pods."),n("Create new Role test-role-2 allowing update on statefulsets."),n("Bind test-role-2 to ServiceAccount test-sa.")],concepts:[n("IMPERATIVE: kubectl create role test-role-2 --verb=update --resource=statefulsets.apps -n database. Note the .apps suffix for the API group."),n("MEMORIZE: statefulsets are in the apps apiGroup, not core. Use statefulsets.apps in imperative commands."),n("For the edit: kubectl edit role test-role -n database. Change verbs to just get, resources to just pods.")],solution:[n("Edit existing role and create new RBAC resources."),c("kubectl edit role test-role -n database\n# rules: [{apiGroups: [\"\"], resources: [\"pods\"], verbs: [\"get\"]}]\nkubectl create role test-role-2 -n database --verb=update --resource=statefulsets.apps\nkubectl create rolebinding test-role-2-bind -n database --role=test-role-2 --serviceaccount=database:test-sa")]},
{id:46,title:"Binary Integrity",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Verify Kubernetes binaries against sha512 checksums."),n("Delete any binaries whose checksums do not match.")],concepts:[n("MEMORIZE: sha512sum --check reads checksums from a file and validates each. FAILED means the binary was tampered with."),n("NO DOCS NEEDED: Pure Linux command. sha512sum is standard."),n("EXAM TIP: Pipe the check output through grep FAILED to find which binaries need deleting."),n("This is a 30-second question. Run the check, delete the failures, done.")],solution:[n("Verify checksums and delete tampered binaries."),c("cd /opt/candidate/15/binaries/\nsha512sum --check ../checksums.txt\n# Delete any that show FAILED\nsha512sum --check ../checksums.txt 2>&1 | grep FAILED | awk -F: '{print $1}' | xargs rm")]},
{id:47,title:"Pod Security Enforce",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Label namespace team-blue with pod-security enforce restricted."),n("Delete a pod from the privileged Deployment to trigger ReplicaSet failure."),n("Capture the FailedCreate events to a file.")],concepts:[n("DOCS PAGE: Search 'pod security admission' in kubernetes.io. The page shows the label format."),n("MEMORIZE the label: pod-security.kubernetes.io/enforce=restricted. This is a namespace label, not an annotation."),n("KEY CONCEPT: Pod Security Admission only checks NEW pod creation. Existing pods keep running. That's why you delete a pod to trigger the ReplicaSet to try recreating it and fail."),n("The FailedCreate events appear in kubectl describe rs output, not pod events.")],solution:[n("Label the namespace, trigger failure, capture events."),c("kubectl label ns team-blue pod-security.kubernetes.io/enforce=restricted\nPOD=$(kubectl get pods -n team-blue -l app=privileged-runner -o name | head -1)\nkubectl delete $POD -n team-blue\nkubectl describe rs -n team-blue -l app=privileged-runner > /opt/candidate/16/logs")]},
{id:48,title:"Docker Socket SecurityContext",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Harden docker-admin Deployment in sandbox namespace."),n("Add runAsUser 65535, drop ALL capabilities, readOnlyRootFilesystem, no privilege escalation."),n("The docker.sock mount must remain.")],concepts:[n("SAME FIVE SECURITY FIELDS: runAsUser 65535, readOnlyRootFilesystem true, allowPrivilegeEscalation false, capabilities drop ALL. Plus runAsGroup 65535."),n("FASTEST APPROACH: kubectl edit deployment docker-admin -n sandbox. Add the securityContext block to the container spec."),n("The docker.sock mount stays. You're hardening the container, not removing the mount."),n("NO DOCS NEEDED: Same pattern as Q34. Memorize the five fields.")],solution:[n("Edit the deployment to add security context."),c("kubectl edit deployment docker-admin -n sandbox\n# Add to container spec:\n#   securityContext:\n#     runAsUser: 65535\n#     runAsGroup: 65535\n#     readOnlyRootFilesystem: true\n#     allowPrivilegeEscalation: false\n#     capabilities: {drop: [ALL]}")]},
{id:49,title:"SA Role for Deployments",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Find the ServiceAccount used by nginx-pod in test-system namespace."),n("Create Role dev-test-role allowing list, get, watch on deployments."),n("Create RoleBinding dev-test-role-binding for the SA.")],concepts:[n("DIAGNOSIS: kubectl get pod nginx-pod -n test-system -o jsonpath='{.spec.serviceAccountName}' to find the SA name."),n("ALL IMPERATIVE: kubectl create role and kubectl create rolebinding. Same pattern as every other RBAC question."),n("MEMORIZE: deployments are in the apps apiGroup. But kubectl create role handles this automatically when you say --resource=deployments.")],solution:[n("Find SA, then create RBAC imperatively."),c("kubectl get pod nginx-pod -n test-system -o jsonpath='{.spec.serviceAccountName}' > /candidate/sa-name.txt\nkubectl create role dev-test-role --verb=list,get,watch --resource=deployments -n test-system\nkubectl create rolebinding dev-test-role-binding --role=dev-test-role --serviceaccount=test-system:sa-dev-1 -n test-system")]},
{id:50,title:"Dockerfile Kafka Fixes",difficulty:"Easy",domain:"System Hardening",scenario:[n("Fix Dockerfile: pin base image, use non-root user."),n("Fix Deployment: non-root UID, privileged false, readOnlyRootFilesystem true.")],concepts:[n("SAME PATTERN as Q6 and Q41. Third time seeing this. You should be able to do it in 30 seconds."),n("FROM latest to pinned version. USER root to USER nobody. runAsUser 0 to 65535. privileged true to false."),n("NO DOCS NEEDED. Free points. Move fast.")],solution:[n("Apply the standard fixes."),c("# Dockerfile:\nFROM ubuntu:latest -> FROM ubuntu:22.04\nUSER root -> USER nobody\n\n# Deployment:\nrunAsUser: 0 -> runAsUser: 65535\nprivileged: true -> privileged: false\nreadOnlyRootFilesystem: false -> true")]},
{id:51,title:"SA Pod List",difficulty:"Easy",domain:"Cluster Hardening",scenario:[n("Create ServiceAccount backend-sa, Role pod-reader for list and get on pods."),n("Create RoleBinding and a Pod using the SA with bitnami/kubectl image.")],concepts:[n("IMPERATIVE for RBAC: kubectl create sa, kubectl create role, kubectl create rolebinding. Three commands."),n("For the Pod: kubectl run backend-pod --image=bitnami/kubectl:latest --dry-run=client -o yaml, then add serviceAccountName and command."),n("VERIFICATION: kubectl exec backend-pod -- kubectl get pods should succeed with the right RBAC chain in place.")],solution:[n("Create the full RBAC chain imperatively, then the pod."),c("kubectl create sa backend-sa\nkubectl create role pod-reader --verb=list,get --resource=pods\nkubectl create rolebinding pod-reader-binding --role=pod-reader --serviceaccount=default:backend-sa"),c("cat <<'EOF' | kubectl apply -f -\napiVersion: v1\nkind: Pod\nmetadata: {name: backend-pod}\nspec:\n  serviceAccountName: backend-sa\n  containers:\n  - name: kubectl\n    image: bitnami/kubectl:latest\n    command: [\"sleep\", \"3600\"]\nEOF")]},
{id:52,title:"NetworkPolicy Port 80",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Create allow-np in staging namespace."),n("Apply to all pods, allow ingress from same namespace pods only, on TCP port 80.")],concepts:[n("DOCS PAGE: Search 'network policy' for the YAML template. Modify to add port restriction."),n("MEMORIZE: podSelector empty in the 'from' clause means any pod in the same namespace. NOT all traffic — other namespaces are blocked."),n("Adding ports with protocol TCP and port 80 means all other ports are denied. Only port 80 ingress is allowed."),n("This is a quick NetworkPolicy question. Apply and verify.")],solution:[n("Create the policy."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata: {name: allow-np, namespace: staging}\nspec:\n  podSelector: {}\n  policyTypes: [Ingress]\n  ingress:\n  - from:\n    - podSelector: {}\n    ports:\n    - {protocol: TCP, port: 80}\nEOF")]},
{id:53,title:"PSP Prevent Privileged",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Write a multi-document YAML with PSP, ClusterRole, ServiceAccount, and ClusterRoleBinding."),n("PSP prevents privileged containers. ClusterRole uses the special use verb.")],concepts:[n("SAME PATTERN as Q23: PSP with privileged false, ClusterRole with verb use on podsecuritypolicies."),n("MEMORIZE: Multi-document YAML uses --- as the separator between resources."),n("MEMORIZE: The special 'use' verb is unique to PSP. Not get, not list — use."),n("Even though PSP is deprecated, know the YAML structure for the exam.")],solution:[n("Write all resources in a multi-document YAML."),c("# PodSecurityPolicy: prevent-privileged-policy\n#   privileged: false, allowPrivilegeEscalation: false\n#   volumes: [configMap, emptyDir, secret]\n# ClusterRole: prevent-role (verb: use on PSP)\n# ServiceAccount: psp-sa (namespace: default)\n# ClusterRoleBinding: prevent-role-binding")]},
{id:54,title:"Deny All Ingress & Egress",difficulty:"Easy",domain:"Microservice Vulns",scenario:[n("Complete a skeleton NetworkPolicy at /home/policy/network-policy.yaml."),n("Name it deny-network in test namespace. Block all ingress and egress.")],concepts:[n("SAME PATTERN as Q2: podSelector empty, policyTypes both Ingress and Egress, no rules means deny all."),n("You've seen this three times now: Q2, Q36, Q54. It should be muscle memory."),n("Apply it and verify with kubectl describe netpol to confirm deny-all behavior.")],solution:[n("Complete and apply the deny-all policy."),c("cat <<'EOF' > /home/policy/network-policy.yaml\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata: {name: deny-network, namespace: test}\nspec:\n  podSelector: {}\n  policyTypes: [Ingress, Egress]\nEOF\nkubectl apply -f /home/policy/network-policy.yaml")]},
];

// ═══ STATE ══════════════════════════════════════════════════
let currentExam = null;
let currentTestNum = null;
let currentQuestions = [];
let currentIndex = 0;
let ttsRate = 1.0;
let currentUtterance = null;
let currentTtsCleanup = null;
let preferredVoice = null;
let isPaused = false;
let lineSpans = [];
let lineIndex = 0;
let stopped = true;

// ═══ VOICE ══════════════════════════════════════════════════
function findBestVoice(){const v=speechSynthesis.getVoices();return v.find(x=>x.name.includes('Online')&&x.name.includes('Natural')&&x.lang==='en-US')||v.find(x=>x.name.includes('Microsoft')&&x.name.includes('Online')&&x.lang==='en-US')||v.find(x=>x.lang==='en-US')||v.find(x=>x.lang.startsWith('en'))||v[0]}
speechSynthesis.onvoiceschanged=()=>{preferredVoice=findBestVoice()};
preferredVoice=findBestVoice();

// ═══ EXAM SELECTOR ══════════════════════════════════════════
function buildMenu(){
  const cards=document.getElementById('exam-cards');
  cards.innerHTML='';
  for(const[key,exam] of Object.entries(EXAMS)){
    for(const[tNum,test] of Object.entries(exam.tests)){
      const d=document.createElement('div');
      d.className='exam-card';
      d.onclick=()=>startExam(key,parseInt(tNum));
      d.onmouseenter=()=>showCopyCmd(key,parseInt(tNum));
      const qs=key==='CKA'?CKA_QUESTIONS:CKS_QUESTIONS;
      const count=qs.filter(q=>q.id>=test.start&&q.id<=test.end).length;
      d.innerHTML=`<h2>${exam.name}</h2><p>${test.label}</p><div class="count">${count} questions</div>`;
      cards.appendChild(d);
    }
  }
}

function showCopyCmd(examKey, testNum){
  const bar=document.getElementById('copy-bar');
  const code=document.getElementById('copy-cmd');
  const exam=EXAMS[examKey];
  let cmd;
  if(examKey==='CKA'){
    cmd=`git clone https://github.com/${exam.repo}.git /tmp/CKA-PREP-2025 && cd /tmp/CKA-PREP-2025 && bash scripts/practice.sh`;
  } else {
    cmd=`git clone https://github.com/${exam.repo}.git /tmp/CKS-PREP-2025 && cd /tmp/CKS-PREP-2025 && bash scripts/setup-tools.sh && ./cks-prep --test ${testNum}`;
  }
  code.textContent=cmd;
  bar.style.display='flex';
}

function copyCmd(){
  const code=document.getElementById('copy-cmd').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.querySelector('#copy-bar button');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',1500);
  });
}

function startExam(examKey, testNum){
  currentExam=examKey;
  currentTestNum=testNum;
  const allQs=examKey==='CKA'?CKA_QUESTIONS:CKS_QUESTIONS;
  const test=EXAMS[examKey].tests[testNum];
  let filtered=allQs.filter(q=>q.id>=test.start&&q.id<=test.end);
  // CKA: Q15 (etcd fix) must come first — setup breaks the API server,
  // so you need to fix it before anything else works
  if(examKey==='CKA'){
    const q15idx=filtered.findIndex(q=>q.id===15);
    if(q15idx>0){const q15=filtered.splice(q15idx,1)[0];filtered.unshift(q15)}
  }
  currentQuestions=filtered;
  currentIndex=0;
  document.getElementById('exam-select').classList.add('hidden');
  document.getElementById('guide-view').classList.add('active');
  document.getElementById('exam-label').textContent=`${EXAMS[examKey].name} ${EXAMS[examKey].tests[testNum].label}`;
  renderQuestion(currentIndex);
}

function backToMenu(){
  stopTTS();
  document.getElementById('guide-view').classList.remove('active');
  document.getElementById('exam-select').classList.remove('hidden');
}

// ═══ TTS ENGINE ═════════════════════════════════════════════
function stopTTS(){stopped=true;isPaused=false;if(currentTtsCleanup){currentTtsCleanup();currentTtsCleanup=null}if(speechSynthesis.speaking||speechSynthesis.pending)speechSynthesis.cancel();document.querySelectorAll('.tts-line-active').forEach(s=>s.classList.remove('tts-line-active'));document.getElementById('content').classList.remove('tts-reading');updatePlayButton();updateProgress()}
function updatePlayButton(){const b=document.getElementById('btn-play');if(stopped){b.innerHTML='&#9654; play';b.classList.remove('active')}else if(isPaused){b.innerHTML='&#9654; resume';b.classList.remove('active')}else{b.innerHTML='&#10074;&#10074; pause';b.classList.add('active')}}
function updateProgress(){const e=document.getElementById('line-progress');e.textContent=lineSpans.length?`line ${Math.min(lineIndex+1,lineSpans.length)}/${lineSpans.length}`:'line 0/0'}
function collectNarratableLines(){lineSpans=Array.from(document.getElementById('content').querySelectorAll('.tts-line[data-type="narration"]'))}

function startTTS(fromSection){
  stopTTS();collectNarratableLines();if(!lineSpans.length)return;
  let startIdx=0;
  if(fromSection){const s=document.getElementById('section-'+fromSection);if(s){const f=s.querySelector('.tts-line[data-type="narration"]');if(f){startIdx=lineSpans.indexOf(f);if(startIdx===-1)startIdx=0}}}
  lineIndex=startIdx;stopped=false;isPaused=false;
  const content=document.getElementById('content');content.classList.add('tts-reading');
  currentTtsCleanup=()=>{stopped=true;content.classList.remove('tts-reading')};
  updatePlayButton();speakLine();
}

function speakLine(){
  if(stopped||lineIndex>=lineSpans.length){lineSpans.forEach(s=>s.classList.remove('tts-line-active'));document.getElementById('content').classList.remove('tts-reading');stopped=true;updatePlayButton();updateProgress();return}
  lineSpans.forEach(s=>s.classList.remove('tts-line-active'));
  lineSpans[lineIndex].classList.add('tts-line-active');
  lineSpans[lineIndex].scrollIntoView({behavior:'smooth',block:'center'});
  updateActiveSection();updateProgress();
  const u=new SpeechSynthesisUtterance(lineSpans[lineIndex].textContent);
  if(preferredVoice)u.voice=preferredVoice;u.rate=ttsRate;u.pitch=1.0;currentUtterance=u;
  u.onend=()=>{lineIndex++;speakLine()};
  u.onerror=(e)=>{if(e.error==='canceled')return;stopped=true;lineSpans.forEach(s=>s.classList.remove('tts-line-active'));document.getElementById('content').classList.remove('tts-reading');updatePlayButton()};
  speechSynthesis.speak(u);
}

function togglePlay(){if(stopped)startTTS(null);else if(isPaused){isPaused=false;speechSynthesis.resume();updatePlayButton()}else{isPaused=true;speechSynthesis.pause();updatePlayButton()}}
function updateActiveSection(){if(lineIndex>=lineSpans.length)return;const s=lineSpans[lineIndex].closest('[data-section]');if(s){document.querySelectorAll('.section-btn').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('sec-'+s.dataset.section);if(btn)btn.classList.add('active')}}

// ═══ RENDER ═════════════════════════════════════════════════
function renderQuestion(idx){
  stopTTS();const q=currentQuestions[idx];const content=document.getElementById('content');
  const info=document.getElementById('question-info');
  const bc=q.difficulty==='Easy'?'badge-easy':q.difficulty==='Medium'?'badge-medium':'badge-hard';
  let domainBadge=q.domain?` <span class="badge badge-domain">${q.domain}</span>`:'';
  info.innerHTML=`<span class="q-num">${idx+1}/${currentQuestions.length}</span> Q${q.id}: <span class="q-title">${esc(q.title)}</span> <span class="badge ${bc}">${q.difficulty}</span>${domainBadge}`;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===currentQuestions.length-1;
  let h='';
  h+=`<div id="section-scenario" data-section="scenario"><div class="section-header">Scenario</div>`;
  q.scenario.forEach(i=>{h+=i.type==='narration'?`<span class="tts-line" data-type="narration">${esc(i.text)}</span>`:`<pre class="code-block">${esc(i.text)}</pre>`});h+='</div>';
  h+=`<div id="section-concepts" data-section="concepts"><div class="section-header">Concepts</div>`;
  q.concepts.forEach(i=>{h+=i.type==='narration'?`<span class="tts-line" data-type="narration">${esc(i.text)}</span>`:`<pre class="code-block">${esc(i.text)}</pre>`});h+='</div>';
  h+=`<div id="section-solution" data-section="solution"><div class="section-header">Solution Walkthrough</div>`;
  q.solution.forEach(i=>{h+=i.type==='narration'?`<span class="tts-line" data-type="narration">${esc(i.text)}</span>`:`<pre class="code-block">${esc(i.text)}</pre>`});h+='</div>';
  content.innerHTML=h;content.scrollTop=0;
  document.querySelectorAll('.section-btn').forEach(b=>b.classList.remove('active'));
  collectNarratableLines();updateProgress();
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// ═══ NAV ════════════════════════════════════════════════════
function nextQuestion(){if(currentIndex<currentQuestions.length-1){currentIndex++;renderQuestion(currentIndex)}}
function prevQuestion(){if(currentIndex>0){currentIndex--;renderQuestion(currentIndex)}}
function jumpSection(name){const el=document.getElementById('section-'+name);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});if(!stopped)startTTS(name)}
function setSpeed(r){ttsRate=r;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===r));if(!stopped&&!isPaused){const ci=lineIndex;speechSynthesis.cancel();lineIndex=ci;speakLine()}}

// ═══ KEYBOARD ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(!document.getElementById('guide-view').classList.contains('active'))return;
  switch(e.key){
    case ' ':e.preventDefault();togglePlay();break;
    case 'ArrowRight':e.preventDefault();nextQuestion();break;
    case 'ArrowLeft':e.preventDefault();prevQuestion();break;
    case 'Escape':e.preventDefault();stopTTS();break;
    case '1':e.preventDefault();jumpSection('scenario');break;
    case '2':e.preventDefault();jumpSection('concepts');break;
    case '3':e.preventDefault();jumpSection('solution');break;
  }
});

// ═══ INIT ═══════════════════════════════════════════════════
buildMenu();
</script>
</body>
</html>
