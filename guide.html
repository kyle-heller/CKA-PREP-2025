// ═══ STATE ══════════════════════════════════════════════════
let currentExam = null;
let currentTestNum = null;
let currentQuestions = [];
let currentIndex = 0;
let ttsRate = 1.0;
let currentUtterance = null;
let currentTtsCleanup = null;
let preferredVoice = null;
let isPaused = false;
let lineSpans = [];
let lineIndex = 0;
let stopped = true;

// ═══ VOICE ══════════════════════════════════════════════════
function findBestVoice(){const v=speechSynthesis.getVoices();return v.find(x=>x.name.includes('Online')&&x.name.includes('Natural')&&x.lang==='en-US')||v.find(x=>x.name.includes('Microsoft')&&x.name.includes('Online')&&x.lang==='en-US')||v.find(x=>x.lang==='en-US')||v.find(x=>x.lang.startsWith('en'))||v[0]}
speechSynthesis.onvoiceschanged=()=>{preferredVoice=findBestVoice()};
preferredVoice=findBestVoice();

// ═══ EXAM SELECTOR ══════════════════════════════════════════
function buildMenu(){
  const cards=document.getElementById('exam-cards');
  cards.innerHTML='';
  for(const[key,exam] of Object.entries(EXAMS)){
    for(const[tNum,test] of Object.entries(exam.tests)){
      const d=document.createElement('div');
      d.className='exam-card';
      d.onclick=()=>startExam(key,parseInt(tNum));
      d.onmouseenter=()=>showCopyCmd(key,parseInt(tNum));
      const qs=key==='CKA'?CKA_QUESTIONS:CKS_QUESTIONS;
      const count=qs.filter(q=>q.id>=test.start&&q.id<=test.end).length;
      d.innerHTML=`<h2>${exam.name}</h2><p>${test.label}</p><div class="count">${count} questions</div>`;
      cards.appendChild(d);
    }
  }
}

function showCopyCmd(examKey, testNum){
  const bar=document.getElementById('copy-bar');
  const code=document.getElementById('copy-cmd');
  const exam=EXAMS[examKey];
  let cmd;
  if(examKey==='CKA'){
    cmd=`git clone https://github.com/${exam.repo}.git /tmp/CKA-PREP-2025 && cd /tmp/CKA-PREP-2025 && bash scripts/practice.sh`;
  } else {
    cmd=`git clone https://github.com/${exam.repo}.git /tmp/CKS-PREP-2025 && cd /tmp/CKS-PREP-2025 && bash scripts/setup-tools.sh && ./cks-prep --test ${testNum}`;
  }
  code.textContent=cmd;
  bar.style.display='flex';
}

function copyCmd(){
  const code=document.getElementById('copy-cmd').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.querySelector('#copy-bar button');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',1500);
  });
}

function startExam(examKey, testNum){
  currentExam=examKey;
  currentTestNum=testNum;
  const allQs=examKey==='CKA'?CKA_QUESTIONS:CKS_QUESTIONS;
  const test=EXAMS[examKey].tests[testNum];
  let filtered=allQs.filter(q=>q.id>=test.start&&q.id<=test.end);
  // CKA: Q15 (etcd fix) must come first — setup breaks the API server,
  // so you need to fix it before anything else works
  if(examKey==='CKA'){
    const q15idx=filtered.findIndex(q=>q.id===15);
    if(q15idx>0){const q15=filtered.splice(q15idx,1)[0];filtered.unshift(q15)}
  }
  currentQuestions=filtered;
  currentIndex=0;
  document.getElementById('exam-select').classList.add('hidden');
  document.getElementById('guide-view').classList.add('active');
  document.getElementById('exam-label').textContent=`${EXAMS[examKey].name} ${EXAMS[examKey].tests[testNum].label}`;
  renderQuestion(currentIndex);
}

function backToMenu(){
  stopTTS();
  document.getElementById('guide-view').classList.remove('active');
  document.getElementById('exam-select').classList.remove('hidden');
}

// ═══ TTS ENGINE ═════════════════════════════════════════════
function stopTTS(){stopped=true;isPaused=false;if(currentTtsCleanup){currentTtsCleanup();currentTtsCleanup=null}if(speechSynthesis.speaking||speechSynthesis.pending)speechSynthesis.cancel();document.querySelectorAll('.tts-line-active').forEach(s=>s.classList.remove('tts-line-active'));document.getElementById('content').classList.remove('tts-reading');updatePlayButton();updateProgress()}
function updatePlayButton(){const b=document.getElementById('btn-play');if(stopped){b.innerHTML='&#9654; play';b.classList.remove('active')}else if(isPaused){b.innerHTML='&#9654; resume';b.classList.remove('active')}else{b.innerHTML='&#10074;&#10074; pause';b.classList.add('active')}}
function updateProgress(){const e=document.getElementById('line-progress');e.textContent=lineSpans.length?`line ${Math.min(lineIndex+1,lineSpans.length)}/${lineSpans.length}`:'line 0/0'}
function collectNarratableLines(){lineSpans=Array.from(document.getElementById('content').querySelectorAll('.tts-line[data-type="narration"]'))}

function startTTS(fromSection){
  stopTTS();collectNarratableLines();if(!lineSpans.length)return;
  let startIdx=0;
  if(fromSection){const s=document.getElementById('section-'+fromSection);if(s){const f=s.querySelector('.tts-line[data-type="narration"]');if(f){startIdx=lineSpans.indexOf(f);if(startIdx===-1)startIdx=0}}}
  lineIndex=startIdx;stopped=false;isPaused=false;
  const content=document.getElementById('content');content.classList.add('tts-reading');
  currentTtsCleanup=()=>{stopped=true;content.classList.remove('tts-reading')};
  updatePlayButton();speakLine();
}

function speakLine(){
  if(stopped||lineIndex>=lineSpans.length){lineSpans.forEach(s=>s.classList.remove('tts-line-active'));document.getElementById('content').classList.remove('tts-reading');stopped=true;updatePlayButton();updateProgress();return}
  lineSpans.forEach(s=>s.classList.remove('tts-line-active'));
  lineSpans[lineIndex].classList.add('tts-line-active');
  lineSpans[lineIndex].scrollIntoView({behavior:'smooth',block:'center'});
  updateActiveSection();updateProgress();
  const u=new SpeechSynthesisUtterance(lineSpans[lineIndex].textContent);
  if(preferredVoice)u.voice=preferredVoice;u.rate=ttsRate;u.pitch=1.0;currentUtterance=u;
  u.onend=()=>{lineIndex++;speakLine()};
  u.onerror=(e)=>{if(e.error==='canceled')return;stopped=true;lineSpans.forEach(s=>s.classList.remove('tts-line-active'));document.getElementById('content').classList.remove('tts-reading');updatePlayButton()};
  speechSynthesis.speak(u);
}

function togglePlay(){if(stopped)startTTS(null);else if(isPaused){isPaused=false;speechSynthesis.resume();updatePlayButton()}else{isPaused=true;speechSynthesis.pause();updatePlayButton()}}
function updateActiveSection(){if(lineIndex>=lineSpans.length)return;const s=lineSpans[lineIndex].closest('[data-section]');if(s){document.querySelectorAll('.section-btn').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('sec-'+s.dataset.section);if(btn)btn.classList.add('active')}}

// ═══ RENDER ═════════════════════════════════════════════════
function renderQuestion(idx){
  stopTTS();const q=currentQuestions[idx];const content=document.getElementById('content');
  const info=document.getElementById('question-info');
  const bc=q.difficulty==='Easy'?'badge-easy':q.difficulty==='Medium'?'badge-medium':'badge-hard';
  let domainBadge=q.domain?` <span class="badge badge-domain">${q.domain}</span>`:'';
  info.innerHTML=`<span class="q-num">${idx+1}/${currentQuestions.length}</span> Q${q.id}: <span class="q-title">${esc(q.title)}</span> <span class="badge ${bc}">${q.difficulty}</span>${domainBadge}`;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===currentQuestions.length-1;
  let h='';
  h+=`<div id="section-scenario" data-section="scenario"><div class="section-header">Scenario</div>`;
  q.scenario.forEach(i=>{h+=i.type==='narration'?`<span class="tts-line" data-type="narration">${esc(i.text)}</span>`:`<pre class="code-block">${esc(i.text)}</pre>`});h+='</div>';
  h+=`<div id="section-concepts" data-section="concepts"><div class="section-header">Concepts</div>`;
  q.concepts.forEach(i=>{h+=i.type==='narration'?`<span class="tts-line" data-type="narration">${esc(i.text)}</span>`:`<pre class="code-block">${esc(i.text)}</pre>`});h+='</div>';
  h+=`<div id="section-solution" data-section="solution"><div class="section-header">Solution Walkthrough</div>`;
  q.solution.forEach(i=>{h+=i.type==='narration'?`<span class="tts-line" data-type="narration">${esc(i.text)}</span>`:`<pre class="code-block">${esc(i.text)}</pre>`});h+='</div>';
  content.innerHTML=h;content.scrollTop=0;
  document.querySelectorAll('.section-btn').forEach(b=>b.classList.remove('active'));
  collectNarratableLines();updateProgress();
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// ═══ NAV ════════════════════════════════════════════════════
function nextQuestion(){if(currentIndex<currentQuestions.length-1){currentIndex++;renderQuestion(currentIndex)}}
function prevQuestion(){if(currentIndex>0){currentIndex--;renderQuestion(currentIndex)}}
function jumpSection(name){const el=document.getElementById('section-'+name);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});if(!stopped)startTTS(name)}
function setSpeed(r){ttsRate=r;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===r));if(!stopped&&!isPaused){const ci=lineIndex;speechSynthesis.cancel();lineIndex=ci;speakLine()}}

// ═══ KEYBOARD ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(!document.getElementById('guide-view').classList.contains('active'))return;
  switch(e.key){
    case ' ':e.preventDefault();togglePlay();break;
    case 'ArrowRight':e.preventDefault();nextQuestion();break;
    case 'ArrowLeft':e.preventDefault();prevQuestion();break;
    case 'Escape':e.preventDefault();stopTTS();break;
    case '1':e.preventDefault();jumpSection('scenario');break;
    case '2':e.preventDefault();jumpSection('concepts');break;
    case '3':e.preventDefault();jumpSection('solution');break;
  }
});

// ═══ INIT ═══════════════════════════════════════════════════
buildMenu();
</script>
