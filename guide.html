<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K8s Audio Guide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d;--surface:#141414;--border:#222;--dim:#333;--muted:#555;
  --text:#c8c8c8;--bright:#e8e8e8;--green:#4ade80;--red:#f87171;
  --amber:#fbbf24;--blue:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* EXAM SELECTOR */
#exam-select{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:24px}
#exam-select h1{font-size:22px;color:var(--green);letter-spacing:2px}
#exam-select .subtitle{color:var(--muted);font-size:12px;margin-top:-12px}
.exam-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 28px;cursor:pointer;transition:all .2s;text-align:center;min-width:180px}
.exam-card:hover{border-color:var(--green);background:#1a1a1a}
.exam-card h2{font-size:16px;color:var(--bright);margin-bottom:4px}
.exam-card p{font-size:11px;color:var(--muted)}
.exam-card .count{color:var(--amber);font-size:13px;margin-top:8px}

/* COPY BAR */
#copy-bar{background:#0a1628;border:1px solid #1e3a5f;border-radius:6px;padding:10px 16px;margin:16px auto 0;max-width:700px;display:none;align-items:center;gap:10px;font-size:11px}
#copy-bar code{color:var(--green);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#copy-bar button{background:#1e3a5f;border:none;color:var(--blue);font-family:inherit;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;white-space:nowrap}
#copy-bar button:hover{background:#2a4a6f}

/* HEADER */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#header-left{display:flex;align-items:center;gap:14px}
#header h1{font-size:15px;font-weight:700;color:var(--green);letter-spacing:1px;cursor:pointer}
#header h1:hover{text-decoration:underline}
#question-info{font-size:13px}
#question-info .q-num{color:var(--amber);font-weight:600}
#question-info .q-title{color:var(--bright)}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-easy{background:#16a34a22;color:var(--green);border:1px solid #16a34a44}
.badge-medium{background:#d9770622;color:var(--amber);border:1px solid #d9770644}
.badge-hard{background:#dc262622;color:var(--red);border:1px solid #dc262644}
.badge-domain{background:#3b82f622;color:var(--blue);border:1px solid #3b82f644;margin-left:4px}
#nav-buttons{display:flex;gap:8px}
#nav-buttons button{background:var(--dim);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
#nav-buttons button:hover{background:var(--muted);color:var(--bright)}
#nav-buttons button:disabled{opacity:.3;cursor:default}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:24px 32px 100px;scroll-behavior:smooth}
.section-header{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-header:first-child{margin-top:0}
.tts-line{display:block;padding:4px 12px;border-radius:4px;transition:all .2s;opacity:.7;cursor:pointer}
.tts-reading .tts-line{opacity:.45}
.tts-reading .tts-line.tts-line-active{opacity:1;color:var(--amber);background:#fbbf2410}
.tts-line:hover{opacity:.9;background:#ffffff06}
.code-block{background:#1a1a2e;border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:12px 16px;margin:8px 0;font-size:13px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#a8d8a8}

/* CONTROLS */
#controls{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
#controls-left{display:flex;align-items:center;gap:12px}
#controls-center{display:flex;align-items:center;gap:8px}
#controls-right{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.ctrl-btn{background:var(--dim);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:6px 14px;border-radius:4px;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{background:var(--muted);color:var(--bright)}
.ctrl-btn.active{background:var(--green);color:var(--bg);border-color:var(--green)}
.section-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.section-btn:hover{color:var(--text);border-color:var(--muted)}
.section-btn.active{color:var(--amber);border-color:var(--amber)}
.speed-btn{background:none;border:none;color:var(--muted);font-family:inherit;font-size:11px;padding:2px 6px;cursor:pointer;border-radius:3px;transition:all .15s}
.speed-btn:hover{color:var(--text)}
.speed-btn.active{color:var(--amber);font-weight:600}
.kbd{font-size:10px;color:var(--dim);padding:1px 4px;border:1px solid var(--dim);border-radius:3px;margin-left:4px}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-track{background:var(--bg)}
#content::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

/* Guide view hidden by default */
#guide-view{display:none;flex-direction:column;height:100vh}
#guide-view.active{display:flex}
#exam-select.hidden{display:none}
</style>
</head>
<body>

<!-- EXAM SELECTOR -->
<div id="exam-select">
  <h1>K8s Cert Audio Guide</h1>
  <p class="subtitle">TTS-narrated practice walkthroughs</p>
  <div id="copy-bar">
    <code id="copy-cmd"></code>
    <button onclick="copyCmd()">Copy</button>
  </div>
  <div class="exam-cards" id="exam-cards"></div>
</div>

<!-- GUIDE VIEW -->
<div id="guide-view">
  <div id="header">
    <div id="header-left">
      <h1 id="exam-label" onclick="backToMenu()">K8s Guide</h1>
      <span id="question-info"></span>
    </div>
    <div id="nav-buttons">
      <button id="btn-prev" onclick="prevQuestion()">&lt;&lt; prev</button>
      <button id="btn-next" onclick="nextQuestion()">next &gt;&gt;</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="controls">
    <div id="controls-left">
      <button class="ctrl-btn" id="btn-play" onclick="togglePlay()">&#9654; play</button>
      <button class="ctrl-btn" id="btn-stop" onclick="stopTTS()">&#9632; stop</button>
    </div>
    <div id="controls-center">
      <button class="section-btn" id="sec-scenario" onclick="jumpSection('scenario')">Scenario<span class="kbd">1</span></button>
      <button class="section-btn" id="sec-concepts" onclick="jumpSection('concepts')">Concepts<span class="kbd">2</span></button>
      <button class="section-btn" id="sec-solution" onclick="jumpSection('solution')">Solution<span class="kbd">3</span></button>
    </div>
    <div id="controls-right">
      <span>
        <button class="speed-btn" onclick="setSpeed(0.8)">0.8x</button>
        <button class="speed-btn active" onclick="setSpeed(1.0)">1.0x</button>
        <button class="speed-btn" onclick="setSpeed(1.2)">1.2x</button>
      </span>
      <span id="line-progress">line 0/0</span>
    </div>
  </div>
</div>

<script>
// ═══ EXAM DEFINITIONS ═══════════════════════════════════════
const EXAMS = {
  "CKA": {
    name: "CKA",
    fullName: "Certified Kubernetes Administrator",
    repo: "kyle-heller/CKA-PREP-2025",
    tests: { 1: { label: "All 17 Questions", start: 1, end: 17 } }
  },
  "CKS": {
    name: "CKS",
    fullName: "Certified Kubernetes Security Specialist",
    repo: "kyle-heller/CKS-PREP-2025",
    tests: {
      1: { label: "Test 1: Q01-Q18", start: 1, end: 18 },
      2: { label: "Test 2: Q19-Q36", start: 19, end: 36 },
      3: { label: "Test 3: Q37-Q54", start: 37, end: 54 },
    }
  }
};

// helper: narration line
function n(t){return{type:"narration",text:t}}
// helper: code block
function c(t){return{type:"code",text:t}}

// ═══ CKA QUESTIONS ══════════════════════════════════════════
const CKA_QUESTIONS=[
{id:1,title:"MariaDB Persistent Volume",difficulty:"Medium",
scenario:[n("A user accidentally deleted the MariaDB Deployment in the mariadb namespace."),n("The deployment was configured with persistent storage."),n("Your job is to re-establish the deployment while preserving data by reusing the available PersistentVolume."),n("A PersistentVolume already exists and is retained for reuse. Only one PV exists in the cluster."),n("You need to create a PVC named mariadb, fix the deployment manifest, and apply it.")],
concepts:[n("DOCS PAGE: Search 'configure persistent volume storage' in kubernetes.io. That task guide has complete PV, PVC, and Pod YAML you can copy and adapt."),n("DIAGNOSIS FIRST: Run kubectl get pv to see the existing volume. Note its capacity, access modes, storageClassName, and status. If status shows Released, it had a previous PVC that was deleted."),n("THE EXAM TRAP: storageClassName must be set to an empty string, quote quote. If you leave it out entirely, Kubernetes uses the default StorageClass and provisions a brand new volume, losing your old data."),n("Match the PVC to the PV exactly: same storageClassName, same or smaller capacity, compatible accessModes. The PV won't bind if any of these mismatch."),n("There's no imperative shortcut for PVC creation. You need YAML. Copy the PVC template from the docs page, change the name, namespace, and storageClassName to empty string."),n("MEMORIZE: The three PV access mode abbreviations. RWO is ReadWriteOnce, ROX is ReadOnlyMany, RWX is ReadWriteMany.")],
solution:[n("Step one. Inspect the existing PV to get the values you need."),c("kubectl get pv\nkubectl describe pv <pv-name>\n# Note: capacity, accessModes, storageClassName, status"),n("Step two. Create the PVC. The empty storageClassName is the critical part."),c("cat <<'EOF' > pvc.yaml\napiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: mariadb\n  namespace: mariadb\nspec:\n  storageClassName: \"\"\n  accessModes:\n  - ReadWriteOnce\n  resources:\n    requests:\n      storage: 250Mi\nEOF\nkubectl apply -f pvc.yaml"),n("Step three. Verify the PVC bound to the existing PV. Status must say Bound."),c("kubectl get pvc mariadb -n mariadb\nkubectl get pv"),n("Step four. Fix the deployment manifest claimName and apply it."),c("sed -i 's/claimName: \"\"/claimName: \"mariadb\"/' ~/mariadb-deploy.yaml\nkubectl apply -f ~/mariadb-deploy.yaml"),n("Step five. Verify the deployment is running."),c("kubectl rollout status deployment mariadb -n mariadb\nkubectl get pods -n mariadb")]},
{id:2,title:"ArgoCD Helm (No CRDs)",difficulty:"Easy",
scenario:[n("Install Argo CD in a Kubernetes cluster using Helm."),n("The CRDs are already pre-installed, so you must ensure Helm does not install them again."),n("Add the official Argo CD Helm repo, generate a template from chart version 7.7.3, and save the output."),n("The generated YAML manifest must be saved to /root/argo-helm.yaml.")],
concepts:[n("NO DOCS NEEDED: This is pure Helm CLI. You need to memorize the helm commands."),n("CRITICAL DISTINCTION: helm template renders YAML locally without touching the cluster. helm install actually deploys. Read the question carefully for which one they want."),n("MEMORIZE: helm repo add, helm repo update, helm template. These three commands in order."),n("The set flag syntax is dash dash set key equals value. For this chart it's crds.install=false."),n("EXAM TIP: Always run helm repo update after helm repo add. Without it you may get stale or missing chart versions."),n("If the output file is wrong, you can re-run helm template. It's idempotent since it only writes to stdout.")],
solution:[n("Step one. Create the namespace with an imperative command."),c("kubectl create namespace argocd"),n("Step two. Add the Helm repo and update."),c("helm repo add argocd https://argoproj.github.io/argo-helm\nhelm repo update"),n("Step three. Generate the template with CRDs disabled. Redirect stdout to the file."),c("helm template argocd argocd/argo-cd \\\n  --version 7.7.3 \\\n  --namespace argocd \\\n  --set crds.install=false \\\n  > /root/argo-helm.yaml"),n("Step four. Sanity check: grep for CustomResourceDefinition. Count should be zero."),c("grep -c 'CustomResourceDefinition' /root/argo-helm.yaml\n# should output 0")]},
{id:3,title:"Sidecar Container",difficulty:"Easy",scenario:[n("There is an existing WordPress deployment that needs a sidecar container."),n("Add a sidecar container named sidecar using the busybox stable image."),n("The sidecar must tail the log file at /var/log/wordpress.log."),n("Use a shared volume so both containers can access the same /var/log directory.")],concepts:[n("DOCS PAGE: Search 'sidecar containers' in kubernetes.io. It has a complete Deployment YAML with a sidecar pattern you can copy."),n("FASTEST APPROACH: Run kubectl edit deployment wordpress and add the sidecar container and volume inline. No need to write YAML from scratch."),n("THREE THINGS TO ADD: One, an emptyDir volume in the volumes list. Two, a volumeMount on the existing container. Three, the new sidecar container with the same volume mounted."),n("EXAM TRAP: Both containers must mount the exact same volume name at the correct path. If volume names don't match, the containers can't share data."),n("MEMORIZE the busybox command syntax. It's command bracket /bin/sh comma -c comma then your shell command as a string. Getting the bracket and quote format wrong is a common error."),n("After editing, the deployment controller automatically rolls out new pods. Watch with kubectl rollout status.")],solution:[n("Step one. Edit the existing deployment to add the volume and sidecar. This is faster than writing a full manifest."),c("kubectl edit deployment wordpress\n# Add under spec.template.spec:\n#   volumes:\n#   - name: log\n#     emptyDir: {}\n# Add volumeMount to existing container:\n#   volumeMounts:\n#   - name: log\n#     mountPath: /var/log\n# Add new container:\n#   - name: sidecar\n#     image: busybox:stable\n#     command: [\"/bin/sh\", \"-c\", \"tail -f /var/log/wordpress.log\"]\n#     volumeMounts:\n#     - name: log\n#       mountPath: /var/log"),n("Alternative: if you prefer a full manifest, here it is."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: wordpress\nspec:\n  template:\n    spec:\n      volumes:\n      - name: log\n        emptyDir: {}\n      containers:\n      - name: wordpress\n        volumeMounts:\n        - name: log\n          mountPath: /var/log\n      - name: sidecar\n        image: busybox:stable\n        command: [\"/bin/sh\", \"-c\", \"tail -f /var/log/wordpress.log\"]\n        volumeMounts:\n        - name: log\n          mountPath: /var/log\nEOF"),n("Step two. Verify both containers are running."),c("kubectl rollout status deployment wordpress\nkubectl get pods -l app=wordpress\n# READY column should show 2/2")]},
{id:4,title:"Resource Allocation",difficulty:"Medium",scenario:[n("You are managing a WordPress application in the resources namespace."),n("The deployment has 3 replicas but resources are not properly configured."),n("Scale down to zero, divide node resources evenly across all 3 pods, then scale back up."),n("Both init containers and main containers must use exactly the same resource requests and limits.")],concepts:[n("DOCS PAGE: Search 'manage resources containers' in kubernetes.io for the resource request and limit YAML syntax."),n("DIAGNOSIS FIRST: Run kubectl describe node to find Allocatable CPU and memory. Then divide by 3 for even distribution. Leave some headroom for system pods."),n("MEMORIZE: Requests are what the scheduler guarantees for placement. Limits are the ceiling before CPU throttling or memory OOM-kill."),n("EXAM TRAP: The question says init containers must have the same resources. If you only set resources on the main container and forget the init containers, you fail the question."),n("FASTEST APPROACH: kubectl edit is fastest here. Scale to zero first so you don't fight scheduling failures while editing. Then scale back up."),n("CPU units: 1000m equals 1 CPU core. Memory units: Mi is mebibytes. Always include the unit suffix.")],solution:[n("Step one. Scale down to zero so edits don't trigger scheduling failures."),c("kubectl scale deployment wordpress -n resources --replicas=0"),n("Step two. Check what resources are available on the node."),c("kubectl describe node | grep -A 5 Allocatable\n# Note the CPU and memory values, divide by 3"),n("Step three. Edit the deployment. Set resources on EVERY container AND init container."),c("kubectl edit deployment wordpress -n resources\n# Set on ALL containers and initContainers:\n# resources:\n#   requests:\n#     cpu: \"300m\"\n#     memory: \"600Mi\"\n#   limits:\n#     cpu: \"400m\"\n#     memory: \"700Mi\""),n("Step four. Scale back up and verify all 3 pods are running."),c("kubectl scale deployment wordpress -n resources --replicas=3\nkubectl rollout status deployment wordpress -n resources\nkubectl get pods -n resources")]},
{id:5,title:"HorizontalPodAutoscaler",difficulty:"Medium",scenario:[n("Create a new HorizontalPodAutoscaler named apache-server in the autoscale namespace."),n("Target the existing apache-deployment with 50% CPU utilization."),n("Configure minimum 1 pod and maximum 4 pods."),n("Set the downscale stabilization window to 30 seconds.")],concepts:[n("DOCS PAGE: Search 'horizontal pod autoscale walkthrough' in kubernetes.io. It has the imperative command and full autoscaling/v2 YAML."),n("IMPERATIVE SHORTCUT: kubectl autoscale deployment apache-deployment dash dash cpu-percent=50 dash dash min=1 dash dash max=4. This creates a basic HPA in one command."),n("BUT this question needs the behavior stabilization window, which the imperative command can't set. So you need YAML for this one."),n("Use autoscaling/v2, not v1. The older v1 API doesn't support the behavior field for stabilization windows."),n("EXAM TRAP: The target deployment MUST have resources.requests.cpu set, or the HPA reports unknown for current CPU. If it says unknown, check the deployment's resource requests."),n("MEMORIZE: The behavior.scaleDown.stabilizationWindowSeconds path. It's deeply nested and easy to get wrong.")],solution:[n("For a basic HPA without behavior, the imperative command is fastest."),c("# If no stabilization was needed, this one-liner works:\nkubectl autoscale deployment apache-deployment -n autoscale \\\n  --cpu-percent=50 --min=1 --max=4"),n("But this question requires the stabilization window. Use YAML."),c("cat <<'EOF' > hpa.yaml\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\n  name: apache-server\n  namespace: autoscale\nspec:\n  scaleTargetRef:\n    apiVersion: apps/v1\n    kind: Deployment\n    name: apache-deployment\n  minReplicas: 1\n  maxReplicas: 4\n  metrics:\n  - type: Resource\n    resource:\n      name: cpu\n      target:\n        type: Utilization\n        averageUtilization: 50\n  behavior:\n    scaleDown:\n      stabilizationWindowSeconds: 30\nEOF\nkubectl apply -f hpa.yaml"),n("Verify the HPA. TARGETS column should show a percentage, not unknown."),c("kubectl get hpa -n autoscale\n# If TARGETS shows <unknown>/50%, the deployment is missing cpu requests")]},
{id:6,title:"CRDs (cert-manager)",difficulty:"Easy",scenario:[n("Cert-manager CRDs are installed in the cluster."),n("List all cert-manager CRDs and save them to /root/resources.yaml."),n("Extract the documentation for the subject field of the Certificate Custom Resource."),n("Save that documentation to /root/subject.yaml.")],concepts:[n("NO DOCS NEEDED: This is pure kubectl commands. Two commands, done."),n("MEMORIZE: kubectl get crd pipes to grep to filter by project name. kubectl explain drills into any resource field including CRDs."),n("kubectl explain uses dot notation to navigate nested fields: resource.spec.field.subfield. Works on CRDs the same as built-in resources."),n("EXAM TIP: This is a free-points question. Don't overthink it. The two commands take 30 seconds total. Save your time for harder questions."),n("If kubectl explain shows no output for a CRD field, the CRD might use a different API version. Try kubectl explain certificate dash dash api-version=cert-manager.io/v1.")],solution:[n("Step one. List cert-manager CRDs and redirect to the file."),c("kubectl get crd | grep cert-manager > /root/resources.yaml"),n("Step two. Use kubectl explain with dot notation to extract the field docs."),c("kubectl explain certificate.spec.subject > /root/subject.yaml"),n("That's it. Two commands. Verify the output files aren't empty."),c("cat /root/resources.yaml\ncat /root/subject.yaml")]},
{id:7,title:"PriorityClass",difficulty:"Easy",scenario:[n("There is a deployment called busybox-logger in the priority namespace."),n("The cluster has at least one user-defined PriorityClass."),n("Create high-priority with a value exactly one less than the highest existing user-defined class."),n("Patch the busybox-logger deployment to use this new priority class.")],concepts:[n("IMPERATIVE COMMAND: kubectl create priorityclass high-priority dash dash value=999. This is one of the few resources with a full imperative create command."),n("DIAGNOSIS FIRST: Run kubectl get priorityclass to see all existing classes. Ignore system classes like system-cluster-critical and system-node-critical. Focus on user-defined ones."),n("The value must be exactly one less than the highest user-defined class. So if the highest is 1000, yours is 999. Read the output carefully."),n("EXAM TRAP: priorityClassName goes in spec.template.spec, not spec directly. It's at the pod level, not the deployment level. kubectl patch is the fastest way to set it."),n("NO DOCS NEEDED: Both commands are imperative. Memorize kubectl create priorityclass and the patch JSON path.")],solution:[n("Step one. Check existing PriorityClasses and find the highest user-defined value."),c("kubectl get priorityclass\n# Ignore system-cluster-critical (2000000000) and system-node-critical (2000001000)\n# Find the highest user-defined value, subtract 1"),n("Step two. Create the PriorityClass imperatively."),c("kubectl create priorityclass high-priority --value=999 --description=\"high priority\""),n("Step three. Patch the deployment. Note the JSON path goes into spec.template.spec."),c("kubectl patch deployment busybox-logger -n priority \\\n  -p '{\"spec\":{\"template\":{\"spec\":{\"priorityClassName\":\"high-priority\"}}}}'"),n("Step four. Verify."),c("kubectl get pc\nkubectl describe deployment busybox-logger -n priority | grep -i priority")]},
{id:8,title:"CNI & Network Policy",difficulty:"Easy",scenario:[n("Install and configure a CNI plugin that supports NetworkPolicy enforcement."),n("Pods must be able to communicate with each other."),n("Choose between Flannel or Calico and install from a provided manifest URL.")],concepts:[n("MEMORIZE THIS FACT: Flannel does NOT support NetworkPolicy. Calico and Cilium DO. Since the question requires NetworkPolicy support, always choose Calico."),n("DIAGNOSIS FIRST: Run kubectl get nodes. If nodes show NotReady, no CNI is installed. Also check kubectl get pods -n kube-system to see if calico, cilium, or flannel pods already exist."),n("On KillerCoda, Cilium may already be installed. If it is, you might not need to install anything. Always check first before blindly installing."),n("The manifest URL will be provided in the question. You just need to kubectl create -f that URL. This is a straightforward apply-and-wait question."),n("NO DOCS NEEDED: The question gives you the manifest URL. Just know which CNI to pick and apply it.")],solution:[n("Step one. Check if a CNI is already installed and what state nodes are in."),c("kubectl get nodes\nkubectl get pods -n kube-system | grep -E 'cilium|calico|flannel'"),n("Step two. If no CNI or if you need to install Calico, apply the manifest."),c("kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/tigera-operator.yaml"),n("Step three. Wait for all pods to be Running and nodes to be Ready."),c("watch kubectl get pods -n calico-system\nkubectl get nodes\n# All nodes should show Ready")]},
{id:9,title:"CRI-Dockerd",difficulty:"Medium",scenario:[n("Install the CRI Docker daemon package from a local deb file."),n("Enable and start the cri-docker service."),n("Configure four sysctl kernel parameters for container networking.")],concepts:[n("NO DOCS NEEDED: This is Linux system administration, not Kubernetes API. You need to memorize the commands."),n("MEMORIZE: dpkg -i to install a deb file. systemctl enable dash dash now to start and enable a service in one command."),n("MEMORIZE the sysctl parameters: bridge-nf-call-iptables equals 1 lets iptables see bridged traffic. ip_forward equals 1 enables IP routing between interfaces. These are prerequisites for any Kubernetes networking to work."),n("Write sysctl configs to /etc/sysctl.d/ with a .conf extension. Then run sysctl dash dash system to apply all configs immediately."),n("EXAM TIP: If you forget a sysctl parameter name, you won't find it in kubernetes.io docs. These are Linux kernel parameters. You must have them memorized."),n("The enable dash dash now flag is a time saver. It combines systemctl enable and systemctl start into one command.")],solution:[n("Step one. Install the deb package and enable the service."),c("sudo dpkg -i /root/cri-dockerd.deb\nsudo systemctl enable --now cri-docker.service"),n("Step two. Write all four sysctl parameters and apply them."),c("sudo tee /etc/sysctl.d/kube.conf >/dev/null <<'EOF'\nnet.bridge.bridge-nf-call-iptables=1\nnet.ipv6.conf.all.forwarding=1\nnet.ipv4.ip_forward=1\nnet.netfilter.nf_conntrack_max=131072\nEOF\nsudo sysctl --system"),n("Step three. Verify each parameter is set."),c("sysctl net.bridge.bridge-nf-call-iptables\nsysctl net.ipv4.ip_forward\nsystemctl status cri-docker.service")]},
{id:10,title:"Taints & Tolerations",difficulty:"Easy",scenario:[n("Taint node01 so no normal pods can schedule on it."),n("Key is PERMISSION, value is granted, effect is NoSchedule."),n("Create a pod named nginx that tolerates the taint and schedules on node01.")],concepts:[n("DOCS PAGE: Search 'taints tolerations' in kubernetes.io. It has the taint command syntax and full toleration YAML you can copy."),n("IMPERATIVE for the taint: kubectl taint nodes node01 key=value:Effect. One command, no YAML needed."),n("For the pod, use kubectl run nginx dash dash image=nginx dash dash dry-run=client -o yaml to generate a skeleton. Then add the toleration block."),n("MEMORIZE the three effects: NoSchedule is hard prevent. PreferNoSchedule is soft. NoExecute evicts existing pods that don't tolerate it."),n("EXAM TRAP: Tolerations alone don't guarantee the pod lands on that specific node. They only allow it. If you need guaranteed placement, add a nodeSelector too."),n("To remove a taint later, add a minus at the end: kubectl taint nodes node01 PERMISSION=granted:NoSchedule-")],solution:[n("Step one. Apply the taint imperatively."),c("kubectl taint nodes node01 PERMISSION=granted:NoSchedule"),n("Step two. Generate a pod skeleton, then add the toleration."),c("kubectl run nginx --image=nginx --dry-run=client -o yaml > nginx.yaml"),n("Add the toleration block to the pod spec."),c("# Add to spec: in nginx.yaml\n  tolerations:\n  - key: PERMISSION\n    operator: Equal\n    value: granted\n    effect: NoSchedule"),c("kubectl apply -f nginx.yaml"),n("Step three. Verify the pod is running on node01."),c("kubectl get pods -o wide\n# NODE column should show node01")]},
{id:11,title:"Gateway API Migration",difficulty:"Medium",scenario:[n("An existing web application uses an Ingress resource named web."),n("Migrate this to the Kubernetes Gateway API."),n("Create a Gateway named web-gateway and an HTTPRoute named web-route."),n("Both use hostname gateway.web.k8s.local. A GatewayClass nginx-class is installed.")],concepts:[n("DOCS PAGE: Search 'gateway API' in kubernetes.io. The Gateway API docs have complete Gateway and HTTPRoute YAML templates you can copy."),n("DIAGNOSIS FIRST: Run kubectl describe ingress web to see the existing TLS config, hostnames, paths, and backend service. You need these values for the migration."),n("The Gateway API has three layers: GatewayClass is the controller, which is already installed. Gateway defines listeners like ports and TLS. HTTPRoute defines routing rules to backend services."),n("MIGRATION PATTERN: Ingress TLS section maps to Gateway listener tls block. Ingress rules and paths map to HTTPRoute rules with matches and backendRefs."),n("The HTTPRoute connects to the Gateway through parentRefs. This is the link between the two resources. If parentRefs is wrong, the route won't attach."),n("EXAM TIP: Copy the Gateway and HTTPRoute YAML templates from the docs. Change the names, hostname, service name, and port. Don't write from memory.")],solution:[n("Step one. Inspect the existing Ingress to get the values you need."),c("kubectl describe ingress web\n# Note: TLS secret name, hostname, path, backend service name and port"),n("Step two. Create the Gateway. Copy the TLS details from the Ingress."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: gateway.networking.k8s.io/v1\nkind: Gateway\nmetadata:\n  name: web-gateway\nspec:\n  gatewayClassName: nginx-class\n  listeners:\n  - name: https\n    protocol: HTTPS\n    port: 443\n    hostname: gateway.web.k8s.local\n    tls:\n      mode: Terminate\n      certificateRefs:\n      - kind: Secret\n        name: web-tls\nEOF"),n("Step three. Create the HTTPRoute. parentRefs links it to the Gateway."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: gateway.networking.k8s.io/v1\nkind: HTTPRoute\nmetadata:\n  name: web-route\nspec:\n  parentRefs:\n  - name: web-gateway\n  hostnames:\n  - \"gateway.web.k8s.local\"\n  rules:\n  - matches:\n    - path:\n        type: PathPrefix\n        value: /\n    backendRefs:\n    - name: web-service\n      port: 80\nEOF"),n("Step four. Verify both resources are created and the route is attached."),c("kubectl get gateway,httproute\n# Gateway should show Programmed, HTTPRoute should show Accepted")]},
{id:12,title:"Ingress",difficulty:"Easy",scenario:[n("There is a deployment named echo in the echo-sound namespace."),n("Expose it with a NodePort service called echo-service on port 8080."),n("Create an Ingress resource named echo for host example.org with path /echo.")],concepts:[n("DOCS PAGE: Search 'ingress' in kubernetes.io. The Ingress page has minimal, fanout, and TLS YAML templates you can copy directly."),n("IMPERATIVE for the service: kubectl expose deployment echo -n echo-sound dash dash name echo-service dash dash type NodePort dash dash port 8080. One command, no YAML."),n("kubectl expose is almost always better than kubectl create service because it automatically infers the selector from the deployment's pod labels."),n("For the Ingress resource, you need YAML. Copy the minimal Ingress template from the docs page and change the name, host, path, service name, and port."),n("MEMORIZE: pathType is required. Use Prefix for path-based routing. If you forget pathType, the Ingress won't validate."),n("EXAM TIP: Create the service first, then the Ingress. The Ingress references the service by name and port, so the service must exist.")],solution:[n("Step one. Create the service imperatively. This is much faster than writing service YAML."),c("kubectl expose deployment echo -n echo-sound \\\n  --name echo-service --type NodePort \\\n  --port 8080 --target-port 8080"),n("Step two. Create the Ingress. Copy this template from the docs, change the values."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: echo\n  namespace: echo-sound\nspec:\n  rules:\n  - host: example.org\n    http:\n      paths:\n      - path: /echo\n        pathType: Prefix\n        backend:\n          service:\n            name: echo-service\n            port:\n              number: 8080\nEOF"),n("Step three. Verify both resources."),c("kubectl get ingress,svc -n echo-sound")]},
{id:13,title:"Network Policy (Least-Permissive)",difficulty:"Medium",scenario:[n("Two deployments: Frontend in frontend namespace, Backend in backend namespace."),n("Three NetworkPolicy YAML files are in /root/network-policies/."),n("Determine which allows interaction in the least permissive way."),n("Deploy only the correct policy.")],concepts:[n("DOCS PAGE: Search 'network policy' in kubernetes.io. The NetworkPolicy page explains the YAML structure and has a full example with ingress and egress rules."),n("KEY CONCEPT: In NetworkPolicy, each item under 'from' is OR logic. Items within a single 'from' entry are AND logic. This distinction is how you compare permissiveness."),n("HOW TO COMPARE: Look for broad selectors like empty podSelector or wide IP ranges. The least permissive policy uses the most specific selectors targeting only what's needed."),n("EXAM STRATEGY: Read each policy file. Ask: does this allow traffic from places it shouldn't? Extra IP blocks, missing namespace restrictions, or empty selectors all mean more permissive."),n("This is a reading comprehension question. You don't write any YAML. You just pick the right file and apply it. Take 60 seconds to read carefully rather than guessing.")],solution:[n("Step one. Read all three policies and compare them."),c("cat /root/network-policies/network-policy-1.yaml\ncat /root/network-policies/network-policy-2.yaml\ncat /root/network-policies/network-policy-3.yaml"),n("HOW TO EVALUATE: Policy allowing all ingress is too broad. Policy with unnecessary IP blocks is more permissive than needed. The policy that restricts to only the frontend namespace and specific pod labels is least permissive."),n("Step two. Apply only the least permissive policy."),c("kubectl apply -f /root/network-policies/network-policy-3.yaml"),n("Step three. Verify the policy is applied."),c("kubectl get networkpolicy -n backend\nkubectl describe networkpolicy -n backend")]},
{id:14,title:"StorageClass",difficulty:"Easy",scenario:[n("Create a StorageClass named local-storage with rancher.io/local-path provisioner."),n("Set VolumeBindingMode to WaitForFirstConsumer."),n("Patch it to be the default, and ensure it is the only default.")],concepts:[n("DOCS PAGE: Search 'storage class' in kubernetes.io. The StorageClass page has YAML templates and explains all the fields."),n("The StorageClass YAML is short. Only four fields: apiVersion, kind, metadata.name, provisioner, and volumeBindingMode. You can write it from memory or copy from docs."),n("MEMORIZE: WaitForFirstConsumer delays volume binding until a pod needs it. This ensures the volume is created on the right node. Immediate binds right away which can cause node mismatch."),n("MEMORIZE: The default annotation is storageclass.kubernetes.io/is-default-class set to true. Only one StorageClass should have this."),n("EXAM TRAP: Check kubectl get sc first. If another StorageClass is already default, you must remove its annotation or the cluster will have two defaults. Patch it to false."),n("kubectl patch is the fastest way to set annotations. Memorize the JSON path: metadata.annotations with the full annotation key.")],solution:[n("Step one. Check existing StorageClasses."),c("kubectl get sc\n# Note which one is currently marked (default)"),n("Step two. Create the new StorageClass. Short enough to write from memory."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: storage.k8s.io/v1\nkind: StorageClass\nmetadata:\n  name: local-storage\nprovisioner: rancher.io/local-path\nvolumeBindingMode: WaitForFirstConsumer\nEOF"),n("Step three. Make it the default."),c("kubectl patch storageclass local-storage -p \\\n  '{\"metadata\":{\"annotations\":{\"storageclass.kubernetes.io/is-default-class\":\"true\"}}}'"),n("Step four. Remove default from the old StorageClass."),c("kubectl patch storageclass local-path -p \\\n  '{\"metadata\":{\"annotations\":{\"storageclass.kubernetes.io/is-default-class\":\"false\"}}}' 2>/dev/null || true"),n("Step five. Verify only one default exists."),c("kubectl get sc\n# Only local-storage should show (default)")]},
{id:15,title:"Etcd Fix (API Server Broken)",difficulty:"Hard",scenario:[n("After a cluster migration, the kube-apiserver is not coming up."),n("The API server was left pointing to etcd peer port 2380 instead of client port 2379."),n("Fix the configuration so the API server connects correctly.")],concepts:[n("WHEN KUBECTL DOESN'T WORK: This is the number one troubleshooting scenario on the CKA. When kubectl says connection refused or the API server is down, don't panic. Follow this diagnostic sequence."),n("DIAGNOSTIC STEP ONE: Check if the kubelet is running. Run systemctl status kubelet. The kubelet manages static pods including the API server. If kubelet is down, nothing works."),n("DIAGNOSTIC STEP TWO: Check the static pod manifests at /etc/kubernetes/manifests/. The API server, etcd, controller-manager, and scheduler are all static pods. Look for recent changes or errors."),n("DIAGNOSTIC STEP THREE: Check container logs directly. Since kubectl is down, use crictl ps -a to see container status, and crictl logs to read their output."),n("MEMORIZE: Etcd uses TWO ports. 2379 is the client port that the API server connects to. 2380 is the peer port for etcd cluster replication. Mixing them up breaks the API server."),n("MEMORIZE: Static pod manifest path is /etc/kubernetes/manifests/. When you edit a file there, kubelet automatically detects the change and restarts the pod. No kubectl needed."),n("EXAM TIP: On any troubleshooting question, start with crictl and journalctl. These work even when kubectl is completely dead. crictl ps -a shows all containers. journalctl -u kubelet shows kubelet logs.")],solution:[n("Step one. Confirm kubectl is broken and start diagnosing."),c("kubectl get nodes\n# Connection refused - API server is down\nsystemctl status kubelet\n# kubelet should be running"),n("Step two. Check what containers are running using crictl, which works without the API server."),c("crictl ps -a\n# Look for kube-apiserver container - it may be in Exited state\ncrictl logs <apiserver-container-id>\n# Look for connection errors mentioning etcd"),n("Step three. Inspect the API server manifest for etcd configuration."),c("sudo grep 'etcd-servers' /etc/kubernetes/manifests/kube-apiserver.yaml\n# You'll see: --etcd-servers=https://127.0.0.1:2380\n# Port 2380 is WRONG - that's the peer port\n# It should be 2379 (client port)"),n("Step four. Fix the port in the manifest."),c("sudo sed -i 's/:2380/:2379/g' /etc/kubernetes/manifests/kube-apiserver.yaml"),n("Step five. Wait for kubelet to detect the change and restart the API server."),c("# kubelet watches the manifests directory and auto-restarts\nsleep 30\nkubectl get nodes\n# Should work now")]},
{id:16,title:"NodePort Service",difficulty:"Easy",scenario:[n("A deployment named nodeport-deployment exists in the relative namespace."),n("Configure it to expose port 80 with name http and protocol TCP."),n("Create a NodePort Service named nodeport-service mapping port 80 to NodePort 30080.")],concepts:[n("IMPERATIVE SHORTCUT: kubectl expose deployment nodeport-deployment -n relative dash dash name nodeport-service dash dash type NodePort dash dash port 80 dash dash target-port 80. But this won't let you set a specific nodePort, so you'll need to edit or use YAML."),n("DOCS PAGE: Search 'service' in kubernetes.io. The Service page has NodePort YAML templates you can copy."),n("MEMORIZE the three ports: port is what the service listens on inside the cluster. targetPort is the container port. nodePort is the external port on every node, range 30000-32767."),n("DIAGNOSIS: First check the deployment's pod labels with kubectl get deployment -n relative dash dash show-labels. The service selector MUST match these labels or traffic won't route."),n("The question also asks to add a named port to the deployment containers. Use kubectl edit or kubectl patch to add the ports array with name, containerPort, and protocol."),n("EXAM TIP: When a specific nodePort is required like 30080, you can't set it imperatively. You need YAML or kubectl expose then kubectl edit to add the nodePort.")],solution:[n("Step one. Check the deployment's labels so you know what selector to use."),c("kubectl get deployment nodeport-deployment -n relative --show-labels\nkubectl get deployment nodeport-deployment -n relative -o jsonpath='{.spec.template.metadata.labels}'"),n("Step two. Patch the deployment to add the named container port."),c("kubectl patch deployment nodeport-deployment -n relative -p '{\n  \"spec\":{\"template\":{\"spec\":{\"containers\":[{\n    \"name\":\"nginx\",\n    \"ports\":[{\"name\":\"http\",\"containerPort\":80,\"protocol\":\"TCP\"}]\n  }]}}}}'\n"),n("Step three. Create the NodePort service. You need YAML because a specific nodePort is required."),c("cat <<'EOF' | kubectl apply -f -\napiVersion: v1\nkind: Service\nmetadata:\n  name: nodeport-service\n  namespace: relative\nspec:\n  type: NodePort\n  selector:\n    app: nodeport-deployment\n  ports:\n  - port: 80\n    targetPort: 80\n    protocol: TCP\n    nodePort: 30080\nEOF"),n("Step four. Verify the service and test connectivity."),c("kubectl get svc nodeport-service -n relative\ncurl localhost:30080")]},
{id:17,title:"TLS Configuration",difficulty:"Medium",scenario:[n("A deployment in nginx-static namespace has a ConfigMap supporting TLS 1.2 and 1.3."),n("Edit the ConfigMap to only allow TLS 1.3."),n("Add the service IP to /etc/hosts and verify with curl.")],concepts:[n("NO DOCS NEEDED: This is editing a ConfigMap and using curl. Both are command-line skills you need to memorize."),n("DIAGNOSIS FIRST: Run kubectl get configmap nginx-config -n nginx-static -o yaml to see the current nginx configuration. Look for ssl_protocols. It will say TLSv1.2 TLSv1.3. You need to remove TLSv1.2."),n("MEMORIZE: In nginx config, ssl_protocols controls which TLS versions are accepted. TLSv1.3 is the most secure. Remove TLSv1.2 to only allow 1.3."),n("EXAM TRAP: After editing a ConfigMap, pods do NOT automatically pick up changes. You MUST run kubectl rollout restart to recreate the pods with the new config."),n("MEMORIZE the jsonpath syntax for getting a service ClusterIP: kubectl get svc name -o jsonpath='{.spec.clusterIP}'. You'll use this pattern in several exam questions."),n("VERIFICATION: curl dash vk dash dash tls-max 1.2 should fail with a handshake error. curl dash vk dash dash tlsv1.3 should succeed. If both work, your change didn't take effect.")],solution:[n("Step one. Inspect the current ConfigMap to see what needs changing."),c("kubectl get configmap nginx-config -n nginx-static -o yaml\n# Find: ssl_protocols TLSv1.2 TLSv1.3;"),n("Step two. Edit to remove TLSv1.2."),c("kubectl get configmap nginx-config -n nginx-static -o yaml | \\\n  sed 's/ssl_protocols TLSv1.2 TLSv1.3;/ssl_protocols TLSv1.3;/' | \\\n  kubectl apply -f -"),n("Step three. Get the service IP and add it to /etc/hosts."),c("SVC_IP=$(kubectl get svc nginx-static -n nginx-static \\\n  -o jsonpath='{.spec.clusterIP}')\necho \"$SVC_IP ckaquestion.k8s.local\" >> /etc/hosts"),n("Step four. Restart the deployment so pods pick up the new ConfigMap."),c("kubectl rollout restart -n nginx-static deployment nginx-static\nkubectl rollout status -n nginx-static deployment nginx-static"),n("Step five. Verify TLS 1.2 is rejected and 1.3 works."),c("curl -vk --tls-max 1.2 https://ckaquestion.k8s.local  # should FAIL\ncurl -vk --tlsv1.3 https://ckaquestion.k8s.local     # should WORK")]},
];
